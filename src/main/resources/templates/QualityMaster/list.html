<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quality Master</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    margin: 0;
    background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
        url("https://t4.ftcdn.net/jpg/03/10/16/27/240_F_310162798_6hWbaSFgDtWp4AhhaKPlTgAZUDL1c4UY.jpg");
    background-size: cover;
}

/* NAVBAR */
.navbar {
    background: linear-gradient(135deg, #1f2a30, #243840);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    height: 80px;
}

.navbar-brand {
    font-weight: 600;
    font-size: 25px;
}

.nav-link {
    margin: 0 14px;
    font-size: 18px;
    font-weight: 600;
    color: #ffffff !important;
    position: relative;
}

.nav-link::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -6px;
    width: 0%;
    height: 2px;
    background: #39d98a;
    transition: 0.3s ease;
}

.nav-link:hover::after {
    width: 100%;
}

.btn-logout {
    border-radius: 20px;
    padding: 6px 18px;
    font-size: 18px;
    font-weight: 600;
}

/* PAGE */
.page-container {
    max-width: 1100px;
    margin: 45px auto;
    padding: 0 10px;
    color: white;
}

.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
    backdrop-filter: blur(8px);
    padding: 14px 18px;
    border-radius: 8px;
    box-shadow: 0 8px 22px rgba(0,0,0,0.25);
}

.page-header h2 {
    margin: 0;
    font-weight: 600;
}

/* BUTTONS */
.btn-add {
    background: #39d98a;
    color: #000;
    font-weight: 600;
    border-radius: 20px;
    padding: 8px 18px;
    border: none;
}

.btn-add:hover {
    background: #2fbf78;
}

.btn-edit {
    background: #39d98a;
    color: #000;
    font-weight: 600;
    border-radius: 16px;
    padding: 4px 14px;
    border: none;
}

.btn-delete {
    background: #dc3545;
    color: #fff;
    font-weight: 600;
    border-radius: 16px;
    padding: 4px 14px;
    border: none;
}

/* TABLE */
.table {
    border-collapse: separate;
    border-spacing: 0 14px;
    color: #ffffff;
}

.table thead th {
    background: rgba(255,255,255,0.12);
    border: none;
}

.table tbody tr {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
    transition: all 0.3s ease;
}

.table tbody tr:hover {
    box-shadow: 0 12px 30px rgba(0,0,0,0.45);
    transform: translateY(-2px);
}

.table tbody td {
    border: none;
    padding: 16px 14px;
    background: rgba(255,255,255,0.12);
    vertical-align: middle;
}

/* MODAL */
.modal-content {
    border-radius: 12px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-3 d-flex justify-content-between">
    <span class="navbar-brand">ShreeGuru Software Solutions</span>

    <div class="d-flex align-items-center">
        <ul class="navbar-nav flex-row">
            <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="/gen-bill">Create Job Contract</a></li>
            <li class="nav-item"><a class="nav-link" href="/report">Report</a></li>
            <li class="nav-item"><a class="nav-link" href="/quality">Quality Master</a></li>
        </ul>

        <form action="/logout" method="post" class="ms-3">
            <button class="btn btn-danger btn-logout">Logout</button>
        </form>
    </div>
</nav>

<!-- CONTENT -->
<div class="page-container">

    <div class="page-header">
        <h2>Quality Master</h2>
        <a href="/quality/create" class="btn btn-add">+ Add New</a>
    </div>

    <table class="table text-center">
        <thead>
            <tr>
                <th>Quality Name</th>
                <th>Width</th>
                <th>Reed</th>
                <th>Pick</th>
                <th>Weave</th>
                <th style="width:200px;">Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="q : ${list}">
                <td th:text="${q.qualityName}"></td>
                <td th:text="${q.width}"></td>
                <td th:text="${q.reed}"></td>
                <td th:text="${q.pick}"></td>
                <td th:text="${q.weave}"></td>
                <td>
                    <a th:href="@{/quality/edit/{id}(id=${q.id})}"
                       class="btn btn-edit btn-sm me-2">Edit</a>

                    <button class="btn btn-delete btn-sm"
                            th:attr="data-url=@{/quality/delete/{id}(id=${q.id})}"
                            onclick="openDeleteModal(this)">
                        Delete
                    </button>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<!-- DELETE MODAL -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center p-3">
            <h5 class="mb-3">Confirm Deletion</h5>
            <p class="text-muted">Are you sure you want to delete this record?</p>

            <form id="deleteForm" method="post">
                <div class="d-flex justify-content-center gap-3 mt-3">
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
const deleteForm = document.getElementById('deleteForm');

function openDeleteModal(button) {
    deleteForm.action = button.getAttribute("data-url");
    deleteModal.show();
}
</script>

</body>
</html>
