<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contractor Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --accent-color: #6366f1;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
        }

        /* Desktop specific: No scrollbar */
        @media (min-width: 992px) {
            body, html {
                overflow: hidden;
            }
        }

        .main-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .content-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: radial-gradient(circle at top right, #e0e7ff 0%, #f1f5f9 50%);
            position: relative;
        }

        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--primary-gradient);
            filter: blur(80px);
            opacity: 0.15;
            border-radius: 50%;
            z-index: 0;
        }
        .blob-1 { top: -100px; right: -100px; }
        .blob-2 { bottom: -100px; left: -100px; }

        .profile-card-modern {
            width: 100%;
            max-width: 900px;
            min-height: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: row;
            overflow: hidden;
            z-index: 1;
            animation: slideUp 0.6s ease-out;
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            .profile-card-modern {
                flex-direction: column;
                height: auto;
                min-height: auto;
            }
            .profile-sidebar {
                width: 100% !important;
                padding: 30px 20px !important;
            }
            .profile-form-area {
                padding: 30px 20px !important;
            }
            .content-area {
                padding: 10px;
                align-items: flex-start;
            }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-sidebar {
            width: 35%;
            background: var(--primary-gradient);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 40px;
            text-align: center;
        }

        .avatar-circle {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .profile-form-area {
            flex: 1;
            padding: 40px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-title {
            font-weight: 800;
            font-size: 1.5rem;
            color: #1e293b;
            margin-bottom: 5px;
        }

        .form-subtitle {
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 25px;
        }

        .input-group-custom {
            margin-bottom: 15px;
        }

        .input-group-custom label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .input-group-custom input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            background: white;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .input-group-custom input.readonly {
            background: #f8fafc;
            border-color: #f1f5f9;
            color: #64748b;
        }

        .btn-stack {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn-modern {
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-edit { background: white; color: var(--accent-color); border: 2px solid var(--accent-color); }
        .btn-save { background: var(--primary-gradient); color: white; display: none; }
        .btn-cancel { background: #f1f5f9; color: #64748b; display: none; }

        .badge-verified {
            background: rgba(255, 255, 255, 0.2);
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 0.65rem;
            font-weight: 600;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div th:replace="~{fragments/navbar :: navbar('Profile')}"></div>

        <div class="content-area">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>

            <div class="profile-card-modern">
                <!-- Sidebar -->
                <div class="profile-sidebar">
                    <div class="avatar-circle" th:text="${session.loggedInContractor != null ? #strings.substring(session.loggedInContractor.name, 0, 1).toUpperCase() : 'U'}">A</div>
                    <h4 class="fw-bold mb-0" th:text="${session.loggedInContractor != null ? session.loggedInContractor.name : 'User'}">Name</h4>
                    <p class="small opacity-75 mb-0">Authorized Contractor</p>
                    <div class="badge-verified"><i class="bi bi-patch-check-fill me-1"></i> Verified Account</div>
                </div>

                <!-- Form Area -->
                <div class="profile-form-area">
                    <h2 class="form-title">Account Details</h2>
                    <p class="form-subtitle">Review and update your profile information</p>

                    <form th:action="@{/profile/update}" method="post" id="profileForm">
                        <div class="input-group-custom">
                            <label>Full Name</label>
                            <input type="text" name="name" id="nameInput" class="readonly" th:value="${session.loggedInContractor != null ? session.loggedInContractor.name : ''}" readonly required>
                        </div>
                        <div class="input-group-custom">
                            <label>Email Address</label>
                            <input type="email" class="readonly" th:value="${session.loggedInContractor != null ? session.loggedInContractor.email : ''}" readonly>
                        </div>
                        <div class="input-group-custom">
                            <label>Mobile Number</label>
                            <input type="text" name="mobile" id="mobileInput" class="readonly" th:value="${session.loggedInContractor != null ? session.loggedInContractor.mobile : ''}" 
                                   placeholder="Not set" pattern="[0-9]{10}" maxlength="10" readonly>
                        </div>

                        <div class="btn-stack">
                            <button type="button" class="btn-modern btn-edit" id="editBtn">
                                <i class="bi bi-pencil-fill"></i> Edit Profile
                            </button>
                            <button type="button" class="btn-modern btn-cancel" id="cancelBtn">
                                Cancel
                            </button>
                            <button type="submit" class="btn-modern btn-save" id="saveBtn">
                                <i class="bi bi-check-lg"></i> Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const editBtn = document.getElementById('editBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const saveBtn = document.getElementById('saveBtn');
        const nameInput = document.getElementById('nameInput');
        const mobileInput = document.getElementById('mobileInput');

        editBtn.addEventListener('click', () => {
            nameInput.classList.remove('readonly');
            nameInput.removeAttribute('readonly');
            mobileInput.classList.remove('readonly');
            mobileInput.removeAttribute('readonly');
            nameInput.focus();
            
            editBtn.style.display = 'none';
            cancelBtn.style.display = 'flex';
            saveBtn.style.display = 'flex';
        });

        cancelBtn.addEventListener('click', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
