<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Reports</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>


<div class="container mt-4">


    <h3>Uploaded Files</h3>

    <!-- Upload Button -->
   <form action="/contractor/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button class="btn btn-primary btn-sm">Upload</button>
    </form>

    <!-- Table -->
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>File Name</th>
                <th>Size</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="f : ${files}">
                <td th:text="${f.fileName}"></td>
                <td th:text="${f.size}"></td>
                <td th:text="${f.uploadDate}"></td>

                <td>
                    <a th:href="@{'/contractor/config?fileId=' + ${f.id}}"
   class="btn btn-success btn-sm">➡</a>
                    <a th:href="@{'/contractor/delete-file/' + ${f.id}}"
                       class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
