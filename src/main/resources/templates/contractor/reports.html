<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title> Report</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>

.table {
    font-size: 12px;
}

.table th {
    white-space: nowrap;
    padding: 8px;
}

.table td {
    padding: 6px;
}

.table-responsive {
    max-height: 500px;
    overflow-y: auto;
}

/* Sticky header */
thead th {
    position: sticky;
    top: 0;
    z-index: 2;
}

/* Optional: zebra rows */
.table-striped tbody tr:nth-child(odd) {
    background-color: #f9f9f9;
}
</style>

</style>
</head>

<body>
  <div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h3>Upload Salary Sheet</h3>

    <!-- ✅ UPLOAD FORM -->
    <form method="post" action="/contractor/upload-excel" enctype="multipart/form-data">
        <input type="file" name="file" class="form-control mb-3" accept=".xlsx" required>
        <button type="submit" class="btn btn-success">Upload</button>
    </form>

    <!-- SHOW DATA -->
    <div class="table-responsive mt-4" th:if="${data != null}">

        <table class="table table-bordered table-striped table-hover text-center align-middle">
            <thead class="table-dark sticky-top">
                <tr>
                    <th th:each="col : ${headers}" th:text="${col}"></th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="row : ${data}">
                    <td th:each="cell : ${row}" th:text="${cell}"></td>
                </tr>
            </tbody>
        </table>

        <!-- ✅ SAVE FORM (SEPARATE) -->
        <form method="post" action="/contractor/save-excel">
            <button type="submit" class="btn btn-primary mt-3">
                Save to Database
            </button>
        </form>

        <!-- PAGINATION -->
        <div class="d-flex justify-content-center mt-3">
            <a th:if="${currentPage > 0}"
               th:href="@{/contractor/reports(page=${currentPage - 1})}"
               class="btn btn-secondary me-2">Previous</a>

            <span class="mt-2">
                Page <span th:text="${currentPage + 1}"></span> /
                <span th:text="${totalPages}"></span>
            </span>

            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/contractor/reports(page=${currentPage + 1})}"
               class="btn btn-secondary ms-2">Next</a>
        </div>

    </div>
</div>

</body>
</html>
