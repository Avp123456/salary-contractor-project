<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Report History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }
        .container {
            max-width: 1000px;
            margin-top: 50px;
        }
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }
        .table {
            margin-bottom: 0;
        }
        .table thead {
            background-color: #f1f5f9;
        }
        .table th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            color: #64748b;
            padding: 16px;
            border-bottom: 1px solid #e2e8f0;
        }
        .table td {
            padding: 16px;
            vertical-align: middle;
            color: #334155;
            border-bottom: 1px solid #f1f5f9;
        }
        .btn-upload {
            background-color: #2563eb;
            color: white;
            border-radius: 8px;
            padding: 10px 20px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-upload:hover {
            background-color: #1d4ed8;
            color: white;
            transform: translateY(-1px);
        }
        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        .btn-proceed {
            background-color: #ecfdf5;
            color: #059669;
            border: 1px solid #10b981;
        }
        .btn-proceed:hover {
            background-color: #d1fae5;
        }
        .btn-delete {
            background-color: #fef2f2;
            color: #dc2626;
            border: 1px solid #ef4444;
        }
        .btn-delete:hover {
            background-color: #fee2e2;
        }
        #uploadModal .modal-content {
            border-radius: 12px;
            border: none;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container">
        <div class="header-section">
            <h2 class="fw-bold">Report History</h2>
            <button class="btn btn-upload" data-bs-toggle="modal" data-bs-target="#uploadModal">
                + Upload New File
            </button>
        </div>

        <div class="card">
            <table class="table">
                <thead>
                    <tr>
                        <th>File Name</th>
                        <th>File Size</th>
                        <th>Upload Date</th>
                        <th class="text-center">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="f : ${files}">
                        <td class="fw-medium">
                            <span th:text="${f.fileName}"></span>
                            <span th:if="${f.fileContent == null}" class="badge bg-warning text-dark ms-2 small" style="font-size: 0.65rem;">Old (Re-upload)</span>
                        </td>
                        <td th:text="${f.size + ' bytes'}"></td>
                        <td th:text="${#temporals.format(f.uploadDate, 'dd MMM yyyy, HH:mm')}"></td>
                        <td class="text-center">
                            <a th:href="@{'/contractor/columns?fileId=' + ${f.id}}" class="action-btn btn-proceed me-2 text-decoration-none">
                                Proceed &#10142;
                            </a>
                            <a th:href="@{'/contractor/delete-file/' + ${f.id}}" class="action-btn btn-delete text-decoration-none" 
                               onclick="return confirm('Are you sure you want to delete this file?')">
                                Delete
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(files)}">
                        <td colspan="4" class="text-center py-5 text-muted">No files uploaded yet.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Upload Modal -->
    <div class="modal fade" id="uploadModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Upload Report File</h5>
                    <button type="button" class="btn-close" data-bs-toggle="modal" data-bs-target="#uploadModal"></button>
                </div>
                <div class="modal-body">
                    <form action="/contractor/upload" method="post" enctype="multipart/form-data">
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold">Select Excel File</label>
                            <input type="file" name="file" class="form-control" required>
                        </div>
                        <div class="d-flex justify-content-end gap-2">
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-upload px-4">Upload Now</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
