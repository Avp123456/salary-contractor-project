<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Preview</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h3>Preview Data</h3>
	<thead>
    <tr>
        <th th:each="cell : ${data[0]}" th:text="${cell}"></th>
    </tr>
</thead>
    <!-- Save Button -->
    <form action="/contractor/save-data" method="post" class="mb-3">
        <button class="btn btn-success float-end">Save Data</button>
    </form>

    <table class="table table-bordered">

    <!-- 🔥 YOUR CUSTOM HEADERS -->
    <thead>
        <tr>
            <th th:each="col : ${columns}"
                th:text="${col.columnName}">
            </th>
        </tr>
    </thead>

    <!-- 🔥 FILTERED DATA -->
    <tbody>
        <tr th:each="row : ${data}">
            <td th:each="cell : ${row}" th:text="${cell}"></td>
        </tr>
    </tbody>

</table>
</div>

</body>
</html>
