<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payments Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .container { max-width: 1200px; margin-top: 50px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); background: white; overflow: hidden; }
        .table thead { background-color: #f1f5f9; }
        .table th { font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; color: #64748b; padding: 16px; border-bottom: 1px solid #e2e8f0; }
        .table td { padding: 12px 16px; font-size: 0.875rem; border-bottom: 1px solid #f1f5f9; }
        .badge-pending { background-color: #fef3c7; color: #92400e; font-weight: 600; font-size: 0.75rem; padding: 4px 8px; border-radius: 6px; }
        .btn-pay { background-color: #10b981; color: white; font-weight: 600; padding: 6px 12px; border-radius: 8px; border: none; font-size: 0.8rem; }
        .btn-view { background-color: #f1f5f9; color: #475569; font-weight: 600; padding: 6px 12px; border-radius: 8px; border: none; font-size: 0.8rem; margin-right: 5px; }
        .btn-view:hover { background-color: #e2e8f0; }
        
        /* Modal Styling */
        .modal-content { border-radius: 16px; border: none; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        .modal-header { border-bottom: 1px solid #f1f5f9; padding: 20px 24px; }
        .modal-title { font-weight: 700; color: #1e293b; }
        .modal-body { padding: 24px; }
        .modal-footer { border-top: 1px solid #f1f5f9; padding: 16px 24px; }
        
        .salary-field { margin-bottom: 15px; }
        .salary-field label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #64748b; margin-bottom: 5px; }
        .salary-field input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #e2e8f0; background-color: #f8fafc; font-size: 0.9rem; transition: all 0.2s; }
        .salary-field input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12); background-color: white; }
        .salary-field input[readonly] { background-color: #f1f5f9; cursor: not-allowed; border-color: #f1f5f9; }
        
        .btn-edit-top { color: #2563eb; font-weight: 600; font-size: 0.85rem; border: none; background: none; padding: 0; cursor: pointer; }
        .btn-edit-top:hover { text-decoration: underline; }
        .btn-ok { background-color: #2563eb; color: white; font-weight: 600; padding: 8px 24px; border-radius: 8px; border: none; display: none; }
        .swal2-compact .swal2-icon { margin: -5px auto 2px; transform: scale(0.45); transform-origin: center top; }
        .swal2-compact .swal2-title { font-size: 0.92rem; padding: 0; margin: 0; }
        .swal2-compact .swal2-html-container { font-size: 0.76rem; margin: 3px 0 0; }
        .status-dropdown {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            text-align: center;
            text-align-last: center;
        }
        
        .custom-dropdown-item {
            transition: all 0.2s ease;
        }
        .custom-dropdown-item:hover {
            background-color: #f1f5f9 !important;
            color: #0f172a !important;
            transform: translateX(2px);
        }
    </style>
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0" style="color: #1e293b; letter-spacing: -0.025em;">Payments Management</h2>
        </div>

        <div class="card">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th>Sr No.</th>
                            <th>Employee ID</th>
                            <th>Employee Name</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th class="text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p, stat : ${payments}" th:id="'row-' + ${p.id}">
                            <td th:text="${stat.count}"></td>
                            <td class="fw-medium text-primary" th:text="${p.empCode}"></td>
                            <td th:text="${p.name}"></td>
                            <td class="fw-bold amount-cell" th:text="'₹' + ${#numbers.formatDecimal(p.amount, 1, 'COMMA', 2, 'POINT')}"></td>
                            <td>
                                <div class="dropdown">
                                    <button class="btn btn-sm status-dropdown" type="button" 
                                            th:id="'dropdownMenuButton-' + ${p.id}" 
                                            data-bs-toggle="dropdown" aria-expanded="false"
                                            th:data-id="${p.id}"
                                            th:data-status="${p.status}"
                                            style="width: 100px; font-size: 0.8rem; font-weight: 700; border-radius: 20px; padding: 4px; border: none; color: white;"
                                            th:styleappend="${p.status == 'Paid' ? 'background-color: #10b981;' : 'background-color: #f59e0b;'}"
                                            th:disabled="${p.payslipGenerated}">
                                        <span class="status-text" th:text="${p.status}">Status</span>
                                    </button>
                                    <ul class="dropdown-menu shadow" style="min-width: 120px; border-radius: 12px; padding: 6px; border: 1px solid #e2e8f0; margin-top: 4px;" th:aria-labelledby="'dropdownMenuButton-' + ${p.id}">
                                        <li><a class="dropdown-item custom-dropdown-item" href="javascript:void(0)" th:onclick="'updateCustomStatus(' + ${p.id} + ', \'Pending\')'" style="border-radius: 6px; padding: 6px 16px; font-size: 0.85rem; font-weight: 500; margin-bottom: 2px;">Pending</a></li>
                                        <li><a class="dropdown-item custom-dropdown-item" href="javascript:void(0)" th:onclick="'updateCustomStatus(' + ${p.id} + ', \'Paid\')'" style="border-radius: 6px; padding: 6px 16px; font-size: 0.85rem; font-weight: 500;">Paid</a></li>
                                    </ul>
                                </div>
                            </td>
                            <td class="text-center">
                                <button class="btn btn-view btn-sm px-3" style="font-size: 13px;" th:onclick="'openSalaryModal(' + ${p.id} + ')'">View Structure</button>
                                
                                <button th:if="${!p.payslipGenerated}" 
                                        class="btn btn-pay btn-sm px-3 ms-1" 
                                        style="font-size: 13px;"
                                        th:onclick="'generatePayslip(' + ${p.id} + ')'"
                                        th:data-viewed="${p.structureViewed}"
                                        th:id="'btn-payslip-' + ${p.id}">Generate Payslip</button>
                                        
                                <button th:if="${p.payslipGenerated}" 
                                        class="btn btn-primary btn-sm px-3 ms-1" 
                                        style="background-color: #0f172a; border: none; font-size: 13px;"
                                        th:onclick="'showPayslipOptions(' + ${p.id} + ')'"
                                        th:id="'btn-payslip-' + ${p.id}">View Payslip</button>
                            </td>
                        </tr>
                        <tr th:if="${payments == null || payments.empty}">
                            <td colspan="6" class="text-center py-5 text-muted">
                                No matching payment records found.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Salary Structure Modal -->
    <div class="modal fade" id="salaryModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header d-flex justify-content-between align-items-center">
                    <h5 class="modal-title">Salary Structure</h5>
                    <button type="button" id="editToggleBtn" class="btn-edit-top" onclick="toggleEdit()">Edit</button>
                </div>
                <div class="modal-body">
                    <div id="salaryFieldsContainer" class="row">
                        <!-- Fields will be loaded here via JS -->
                        <div class="text-center py-4">Loading structure...</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Close</button>
                    <button type="button" id="saveBtn" class="btn-ok" onclick="saveSalaryChanges()">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentDataId = null;
        let isEditMode = false;
        const modal = new bootstrap.Modal(document.getElementById('salaryModal'));

        async function openSalaryModal(id) {
            currentDataId = id;
            isEditMode = false;
            document.getElementById('editToggleBtn').innerText = 'Edit';
            document.getElementById('saveBtn').style.display = 'none';
            
            const container = document.getElementById('salaryFieldsContainer');
            container.innerHTML = '<div class="text-center py-4">Loading structure...</div>';
            
            modal.show();
            
            try {
                const response = await fetch(`/contractor/get-payment-details?id=${id}`);
                const data = await response.json();
                
                // Update viewed status dynamically
                const btn = document.getElementById(`btn-payslip-${id}`);
                if (btn) btn.setAttribute('data-viewed', 'true');
                
                container.innerHTML = '';
                let firstStrField = true;
                data.fields.forEach(field => {
                    const isIdField = firstStrField && field.actual.startsWith('str');
                    if (isIdField) firstStrField = false;

                    const col = document.createElement('div');
                    col.className = 'col-md-6 salary-field';
                    col.innerHTML = `
                        <label>${field.name}${isIdField ? ' <span style="font-size:0.65rem;color:#94a3b8;font-weight:400;">(locked)</span>' : ''}</label>
                        <input type="text" 
                               value="${field.value}" 
                               data-actual="${field.actual}" 
                               data-type="${field.type}"
                               ${isIdField ? 'data-locked="true"' : ''}
                               readonly>
                    `;
                    container.appendChild(col);
                });
            } catch (err) {
                container.innerHTML = '<div class="text-center py-4 text-danger">Error loading data.</div>';
            }
        }

        function toggleEdit() {
            isEditMode = !isEditMode;
            const fields = document.querySelectorAll('.salary-field');
            const editBtn = document.getElementById('editToggleBtn');
            const saveBtn = document.getElementById('saveBtn');
            
            if (isEditMode) {
                fields.forEach(field => {
                    const input = field.querySelector('input');
                    // Never allow editing locked (ID) fields
                    if (!input.hasAttribute('data-locked')) {
                        input.removeAttribute('readonly');
                    }
                });
                editBtn.innerText = 'Cancel';
                saveBtn.style.display = 'block';
            } else {
                // Reset all non-locked fields back to readonly
                fields.forEach(field => {
                    const input = field.querySelector('input');
                    if (!input.hasAttribute('data-locked')) {
                        input.setAttribute('readonly', true);
                    }
                });
                editBtn.innerText = 'Edit';
                saveBtn.style.display = 'none';
            }
        }

        async function saveSalaryChanges() {
            const inputs = document.querySelectorAll('#salaryFieldsContainer input');
            const updates = {};
            
            inputs.forEach(input => {
                const col = input.getAttribute('data-actual');
                const val = input.value;
                updates[col] = val;
            });

            try {
                const response = await fetch('/contractor/update-payment-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: currentDataId,
                        updates: updates
                    })
                });                if (await response.text() === 'OK') {
                    // Calculate new total based on the inputs (using the last input as the total amount)
                    const lastInput = inputs[inputs.length - 1];
                    const newTotal = parseFloat(lastInput.value.replace(/,/g, '')) || 0;
                    
                    // Update table UI
                    const row = document.getElementById(`row-${currentDataId}`);
                    if (row) {
                        const amountCell = row.querySelector('.amount-cell');
                        amountCell.innerText = '₹' + newTotal.toLocaleString('en-IN', { minimumFractionDigits: 2 });
                    }
                    
                    modal.hide();
                    
                    Swal.fire({
                        title: 'Updated!',
                        text: 'Salary structure saved.',
                        icon: 'success',
                        width: 250,
                        padding: '16px',
                        customClass: { popup: 'swal2-compact' },
                        confirmButtonColor: '#2563eb',
                        timer: 2000,
                        showConfirmButton: false
                    });
                }
            } catch (err) {
                Swal.fire({
                    title: 'Error',
                    text: 'Failed to save changes.',
                    icon: 'error',
                    width: 250,
                    padding: '16px',
                    customClass: { popup: 'swal2-compact' },
                    confirmButtonColor: '#2563eb'
                });
            }
        }

        async function updateCustomStatus(id, newStatus) {
            try {
                const response = await fetch('/contractor/update-payment-status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id, status: newStatus })
                });

                if (await response.text() === 'OK') {
                    const btn = document.getElementById('dropdownMenuButton-' + id);
                    btn.querySelector('.status-text').innerText = newStatus;
                    btn.setAttribute('data-status', newStatus);
                    
                    if (newStatus === 'Paid') {
                        btn.style.backgroundColor = '#10b981';
                        btn.style.color = 'white';
                    } else {
                        btn.style.backgroundColor = '#f59e0b';
                        btn.style.color = 'white';
                    }
                }
            } catch (err) {
                Swal.fire({ title: 'Error', text: 'Failed to update status.', icon: 'error', width: 250, customClass: { popup: 'swal2-compact' } });
            }
        }

        async function generatePayslip(id) {
            const row = document.getElementById(`row-${id}`);
            const btnDropdown = row.querySelector('.status-dropdown');
            const status = btnDropdown.getAttribute('data-status');
            const btn = document.getElementById(`btn-payslip-${id}`);
            const structureViewed = btn.getAttribute('data-viewed') === 'true';

            if (status !== 'Paid') {
                Swal.fire({
                    title: 'Cannot Generate',
                    text: 'Salary is not paid yet. Please update the status to Paid first.',
                    icon: 'warning',
                    width: 300,
                    customClass: { popup: 'swal2-compact' },
                    confirmButtonColor: '#2563eb'
                });
                return;
            }

            if (!structureViewed) {
                Swal.fire({
                    title: 'Action Required',
                    text: 'You must view the salary structure at least once before generating a payslip.',
                    icon: 'info',
                    width: 300,
                    customClass: { popup: 'swal2-compact' },
                    confirmButtonColor: '#2563eb'
                });
                return;
            }

            try {
                const response = await fetch('/contractor/generate-payslip', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id })
                });

                if (await response.text() === 'OK') {
                    // Lock dropdown
                    const btnDropdown = document.getElementById('dropdownMenuButton-' + id);
                    if(btnDropdown) btnDropdown.disabled = true;
                    
                    // Update button UI to View Payslip
                    btn.innerText = 'View Payslip';
                    btn.classList.remove('btn-pay');
                    btn.classList.add('btn-primary');
                    btn.style.backgroundColor = '#0f172a';
                    btn.style.border = 'none';
                    btn.style.cursor = 'pointer';
                    btn.onclick = () => showPayslipOptions(id);

                    showPayslipOptions(id);
                }
            } catch (err) {
                Swal.fire({ title: 'Error', text: 'Failed to generate payslip.', icon: 'error', width: 250, customClass: { popup: 'swal2-compact' } });
            }
        }

        function showPayslipOptions(id) {
            Swal.fire({
                title: 'Payslip Ready!',
                html: `
                    <div style="text-align: center; font-size: 0.85rem; color: #64748b; margin-bottom: 15px;">
                        What would you like to do with this payslip?
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        <a href="/contractor/payslip/${id}" target="_blank" class="btn btn-primary" style="background: #2563eb; color: white; border: none; padding: 10px; border-radius: 8px; text-decoration: none;">
                            View & Download PDF
                        </a>
                        <button onclick="shareWhatsAppDirect(${id})" class="btn btn-success" style="background: #25D366; color: white; border: none; padding: 10px; border-radius: 8px;">
                            Share via WhatsApp
                        </button>
                        <button onclick="shareEmailDirect(${id})" class="btn btn-danger" style="background: #ea4335; color: white; border: none; padding: 10px; border-radius: 8px;">
                            Share via Email
                        </button>
                    </div>
                `,
                icon: 'success',
                showConfirmButton: false,
                showCloseButton: true,
                width: 320
            });
        }

        function shareWhatsAppDirect(id) {
            const url = window.location.origin + `/contractor/payslip/${id}`;
            const text = encodeURIComponent(`Hello,\n\nYour salary payslip has been generated.\nYou can securely view and download your PDF payslip here:\n${url}`);
            window.open(`https://wa.me/?text=${text}`, '_blank');
        }

        function shareEmailDirect(id) {
            const url = window.location.origin + `/contractor/payslip/${id}`;
            window.location.href = `mailto:?subject=Your Salary Payslip&body=Hello,%0D%0A%0D%0AYour salary payslip has been generated.%0D%0AYou can securely view and download your PDF payslip here:%0D%0A${url}`;
        }
    </script>
</body>
</html>
