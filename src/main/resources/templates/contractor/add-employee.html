<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${employee.employeeId} != null ? 'Edit Employee' : 'Add Employee'">Add Employee</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f4f6f9;
      font-family: 'Segoe UI', sans-serif;
    }

    .page-header {
      padding: 1.6rem 0 1rem;
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .page-header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      color: #1e3a5f;
    }

    .form-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.06);
      max-width: 560px;
      margin: 0 auto;
      overflow: hidden;
    }

    .card-inner-header {
      background: #f8faff;
      border-bottom: 1px solid #e5e7eb;
      padding: 1.2rem 2rem;
      display: flex;
      gap: 0.75rem;
    }

    .ci-icon {
      width: 38px;
      height: 38px;
      background: #dbeafe;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2563eb;
    }

    .card-body-form {
      padding: 2rem;
    }

    .form-label {
      font-weight: 600;
      color: #374151;
    }

    .form-control {
      border-radius: 8px;
      height: 44px;
    }

    .readonly-field {
      background-color: #f9fafb !important;
      color: #9ca3af !important;
      cursor: not-allowed;
    }

    .btn-save {
      background: linear-gradient(135deg, #2563eb, #1e40af);
      color: #fff;
      border-radius: 6px;
      padding: 0.4rem 1.2rem;
    }

    .btn-cancel {
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 0.4rem 1.2rem;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="position-fixed top-0 end-0 p-3" style="z-index: 9999">
  <div id="errorToast" class="toast align-items-center text-bg-danger border-0"
       th:if="${error}" role="alert">

    <div class="d-flex">
      <div class="toast-body">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${error}"></span>
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto"
              data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-header">
  <h1>
    <i class="bi bi-person-plus-fill me-2"></i>
    <span th:text="${employee.employeeId != null ? 'Edit Employee' : 'Add Employee'}"></span>
  </h1>
</div>

<div class="container mb-5">
  <div class="form-card">

    <div class="card-inner-header">
      <div class="ci-icon"><i class="bi bi-person-vcard"></i></div>
      <div>
        <h5 th:text="${employee.employeeId != null ? 'Update Employee Details' : 'Employee Information'}"></h5>
        <small>Fill in the details below</small>
      </div>
    </div>

    <div class="card-body-form">
      <form th:action="@{/contractor/save-employee}" method="post" th:object="${employee}">
        <input type="hidden" th:field="*{employeeId}">

        <!-- EMPLOYEE ID -->
        <div class="mb-4">
          <label class="form-label">
            <i class="bi bi-badge-id me-1 text-primary"></i>Employee ID
          </label>

          <input type="text"
                 th:field="*{empCode}"
                 class="form-control"
                 th:classappend="${employee.employeeId != null} ? ' readonly-field'"
                 th:readonly="${employee.employeeId != null}"
                 placeholder="EMP001"
                 required>
        </div>

        <!-- NAME -->
        <div class="mb-4">
          <label class="form-label">
            <i class="bi bi-person me-1 text-primary"></i>Full Name
          </label>
          <input type="text" th:field="*{name}" class="form-control" required>
        </div>

        <!-- EMAIL -->
        <div class="mb-4">
          <label class="form-label">
            <i class="bi bi-envelope me-1 text-primary"></i>Email Address
          </label>
          <input type="email" th:field="*{email}" class="form-control" required>
        </div>
<!-- PASSWORD (ONLY IN ADD MODE) -->
<div class="mb-4 position-relative" th:if="${employee.employeeId == null}">
  <label class="form-label">
    <i class="bi bi-lock me-1 text-primary"></i>Password
  </label>

  <input type="password"
         th:field="*{password}"
         class="form-control pe-5"
         id="passwordField"
         required>

  <!-- Eye Icon -->
  <i class="bi bi-eye-slash position-absolute"
     id="togglePassword"
     style="top: 38px; right: 15px; cursor: pointer;">
  </i>
</div>

        <hr>

        <div class="d-flex justify-content-end gap-2">
          <a href="/contractor/employees" class="btn-cancel">Cancel</a>

          <button type="submit" class="btn-save">
            <span th:text="${employee.employeeId != null ? 'Update' : 'Save'}"></span>
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
<script>
  const togglePassword = document.getElementById("togglePassword");
  const passwordField = document.getElementById("passwordField");

  if (togglePassword && passwordField) {
    togglePassword.addEventListener("click", function () {

      const type = passwordField.getAttribute("type") === "password" ? "text" : "password";
      passwordField.setAttribute("type", type);

      this.classList.toggle("bi-eye");
      this.classList.toggle("bi-eye-slash");
    });
  }
</script>


<script>
  const toastEl = document.getElementById('errorToast');
  if (toastEl) {
    const toast = new bootstrap.Toast(toastEl);
    toast.show();
  }
</script>

</body>
</html>
