<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Employees</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
  body {
    background-color: #f4f6f9;
    font-family: 'Segoe UI', sans-serif;
  }

  /* ── Page Header ── */
  .page-header {
    padding: 1.6rem 0 1rem;
    text-align: center;
    margin-bottom: 1.8rem;
  }
  .page-header h1 {
    font-size: 1.9rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #1e3a5f;
    margin-bottom: 0;
  }

  /* ── Toolbar row ── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 1.2rem;
  }
  .search-wrapper {
    position: relative;
    flex: 1;
    min-width: 220px;
  }
  .search-wrapper .bi-search {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #6c757d;
    font-size: 1rem;
  }
  #employeeSearch {
    padding-left: 2.2rem;
    border-radius: 8px;
    border: 1px solid #ced4da;
    height: 42px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #employeeSearch:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    outline: none;
  }

  /* ── Add Employee button ── */
  .btn-add-emp {
    background: linear-gradient(135deg, #2563eb, #1e40af);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.5rem 1.2rem;
    font-weight: 600;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    text-decoration: none;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-add-emp:hover {
    opacity: 0.9;
    transform: translateY(-1px);
    color: #fff;
    text-decoration: none;
  }

  /* ── Table ── */
  .emp-table-wrapper {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 14px rgba(0,0,0,0.07);
    overflow: hidden;
  }
  .emp-table-wrapper .table {
    margin: 0;
  }
  .emp-table-wrapper thead tr {
    background: #1e3a5f;
    color: #fff;
  }
  .emp-table-wrapper thead th {
    font-weight: 600;
    font-size: 0.88rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 0.85rem 1rem;
    border: none;
  }
  .emp-table-wrapper tbody tr {
    cursor: default;
    border-bottom: 1px solid #f0f0f0;
  }
  .emp-table-wrapper tbody tr:hover td {
    background-color: #dbeafe !important;
    color: #1e3a5f;
  }
  .emp-table-wrapper tbody td {
    vertical-align: middle;
    padding: 0.75rem 1rem;
    font-size: 0.93rem;
    color: #374151;
    border-color: #f0f0f0;
  }
  .badge-id {
    background: #e0e7ff;
    color: #3730a3;
    font-weight: 600;
    border-radius: 6px;
    padding: 2px 10px;
    font-size: 0.82rem;
  }
</style>
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- Page Header -->
<div class="page-header">
  <h1><i class="bi bi-people-fill me-2"></i>Employees</h1>
</div>

<div class="container">

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrapper">
      <i class="bi bi-search"></i>
      <input type="text" id="employeeSearch" class="form-control"
             placeholder="Search by Employee ID, Name or Email..."
             oninput="filterEmployees()">
    </div>
    <a href="/contractor/add-employee" class="btn-add-emp">
      <i class="bi bi-person-plus-fill"></i> Add Employee
    </a>
  </div>

  <!-- Table -->
  <div class="emp-table-wrapper">
    <div class="table-responsive">
      <table class="table table-borderless">
      <thead>
        <tr>
          <th>Employee ID</th>
          <th>Name</th>
          <th>Email</th>
          <th class="text-center">Actions</th>
        </tr>
      </thead>
      <tbody id="employeeTableBody">
        <tr th:each="emp : ${employees}">
          <td><span class="badge-id" th:text="${emp.empCode}"></span></td>
          <td th:text="${emp.name}"></td>
          <td th:text="${emp.email}"></td>
          <td class="text-center">
            <a th:href="@{'/contractor/edit-employee/' + ${emp.employeeId}}"
               class="btn btn-warning btn-sm me-1">
              <i class="bi bi-pencil-fill"></i> Edit
            </a>
            <button class="btn btn-danger btn-sm"
                    th:onclick="'confirmDelete(' + ${emp.employeeId} + ')'">
              <i class="bi bi-trash-fill"></i> Delete
            </button>
          </td>
        </tr>
        <tr id="noResultsRow" style="display:none;">
          <td colspan="4" class="text-center text-muted py-4">
            <i class="bi bi-search me-1"></i> No employees match your search.
          </td>
        </tr>
      </tbody>
    </table>
    </div>
  </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
function confirmDelete(id) {
    Swal.fire({
        title: 'Are you sure?',
        text: "You won't be able to revert this!",
        icon: 'warning',

        width: '350px',  
      
        padding: '1.5rem',      // optional spacing
        
        showCancelButton: true,
        confirmButtonColor: '#3085d6',
        cancelButtonColor: '#d33',
        confirmButtonText: 'Yes, delete it!',

        customClass: {
            popup: 'small-popup'   // optional for more control
        }
    }).then((result) => {
        if (result.isConfirmed) {
            window.location.href = '/contractor/delete-employee/' + id;
        }
    });
}
</script>

<script>
function filterEmployees() {
    const query   = document.getElementById('employeeSearch').value.toLowerCase().trim();
    const rows    = document.querySelectorAll('#employeeTableBody tr:not(#noResultsRow)');
    const noRow   = document.getElementById('noResultsRow');
    let   visible = 0;

    rows.forEach(function(row) {
        const empId = (row.cells[0] ? row.cells[0].textContent : '').toLowerCase();
        const name  = (row.cells[1] ? row.cells[1].textContent : '').toLowerCase();
        const email = (row.cells[2] ? row.cells[2].textContent : '').toLowerCase();

        const matches = empId.includes(query) || name.includes(query) || email.includes(query);
        row.style.display = matches ? '' : 'none';
        if (matches) visible++;
    });

    noRow.style.display = visible === 0 ? '' : 'none';
}
</script>
</body>
</html>
