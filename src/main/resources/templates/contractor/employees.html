<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Employees</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h3>Employees</h3>

<a href="/contractor/add-employee" class="btn btn-primary mb-3">Add Employee</a>

    <input type="text" class="form-control mb-3" placeholder="Search employee...">

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Actions</th>
            </tr>
        </thead>

		<tbody>
		<tr th:each="emp : ${employees}">
		    <td th:text="${emp.name}"></td>
		    <td th:text="${emp.email}"></td>
		    <td>
<a th:href="@{'/contractor/edit-employee/' + ${emp.employeeId}}"
   class="btn btn-warning btn-sm">Edit</a>
   <button class="btn btn-danger btn-sm"
        th:onclick="'confirmDelete(' + ${emp.employeeId} + ')'">
    Delete
</button>		    </td>
		</tr>
		</tbody>
    </table>
</div>


<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
function confirmDelete(id) {
    Swal.fire({
        title: 'Are you sure?',
        text: "You won't be able to revert this!",
        icon: 'warning',

        width: '350px',  
      
        padding: '1.5rem',      // optional spacing
        
        showCancelButton: true,
        confirmButtonColor: '#3085d6',
        cancelButtonColor: '#d33',
        confirmButtonText: 'Yes, delete it!',

        customClass: {
            popup: 'small-popup'   // optional for more control
        }
    }).then((result) => {
        if (result.isConfirmed) {
            window.location.href = '/contractor/delete-employee/' + id;
        }
    });
}
</script>
</body>
</html>
