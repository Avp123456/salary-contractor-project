<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Employees</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body {
    background-color: #f8fafc;
    font-family: 'Inter', sans-serif;
    color: #1e293b;
  }

  /* ── Page Header ── */
  .page-header {
    padding: 1.6rem 0 1rem;
    text-align: left;
    margin-bottom: 1.8rem;
  }
  .page-header h1 {
    font-size: 1.9rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #1e3a5f;
    margin-bottom: 0;
  }

  /* ── Toolbar row ── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 1.2rem;
  }
  .search-wrapper {
    position: relative;
    flex: 1;
    min-width: 220px;
  }
  .search-wrapper .bi-search {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #6c757d;
    font-size: 1rem;
  }
  #employeeSearch {
    padding-left: 2.2rem;
    border-radius: 8px;
    border: 1px solid #ced4da;
    height: 42px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #employeeSearch:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    outline: none;
  }

  /* ── Add Employee button ── */
  .btn-add-emp {
    background: linear-gradient(135deg, #2563eb, #1e40af);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.5rem 1.2rem;
    font-weight: 600;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    text-decoration: none;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-add-emp:hover {
    opacity: 0.9;
    transform: translateY(-1px);
    color: #fff;
    text-decoration: none;
  }

  /* ── Table ── */
  .emp-table-wrapper {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 14px rgba(0,0,0,0.07);
    overflow: hidden;
  }
  .emp-table-wrapper .table {
    margin: 0;
  }
  .emp-table-wrapper thead tr {
    background: #1e3a5f;
    color: #fff;
  }
  .emp-table-wrapper thead th {
    font-weight: 600;
    font-size: 0.88rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 0.85rem 1rem;
    border: none;
  }
  .emp-table-wrapper tbody tr {
    cursor: default;
    border-bottom: 1px solid #f0f0f0;
  }
  .emp-table-wrapper tbody tr:hover td {
    background-color: #dbeafe !important;
    color: #1e3a5f;
  }
  .emp-table-wrapper tbody td {
    vertical-align: middle;
    padding: 0.75rem 1rem;
    font-size: 0.93rem;
    color: #374151;
    border-color: #f0f0f0;
  }
  .badge-id {
    background: #e0e7ff;
    color: #3730a3;
    font-weight: 600;
    border-radius: 6px;
    padding: 2px 10px;
    font-size: 0.82rem;
  }
</style>
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar('Employees')}"></div>

<div class="container">
<!-- Page Header -->
<div class="page-header">
  <h1><i class="bi bi-people-fill me-2"></i>Employees</h1>
</div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrapper">
      <i class="bi bi-search"></i>
      <input type="text" id="employeeSearch" class="form-control"
             placeholder="Search by Employee ID, Name or Email..."
             oninput="filterAndPaginate()">
    </div>
    <a href="/contractor/add-employee" class="btn-add-emp">
      <i class="bi bi-person-plus-fill"></i> Add Employee
    </a>
  </div>

  <!-- Table -->
  <div class="emp-table-wrapper">
    <div class="table-responsive">
      <table class="table table-borderless">
      <thead>
        <tr>
          <th>Employee ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Mobile No</th>
          <th class="text-center">Actions</th>
        </tr>
      </thead>
      <tbody id="employeeTableBody">
        <tr th:each="emp : ${employees}">
          <td><span class="badge-id" th:text="${emp.empCode}"></span></td>
          <td th:text="${emp.name}"></td>
          <td th:text="${emp.email}"></td>
          <td th:text="${emp.mobileNo}"></td>
          <td class="text-center">
            <a th:href="@{'/contractor/edit-employee/' + ${emp.employeeId}}"
               class="btn btn-warning btn-sm me-1">
              <i class="bi bi-pencil-fill"></i> Edit
            </a>
            <button class="btn btn-danger btn-sm"
                    th:onclick="'confirmDelete(' + ${emp.employeeId} + ')'">
              <i class="bi bi-trash-fill"></i> Delete
            </button>
          </td>
        </tr>
        <tr id="noResultsRow" style="display:none;">
          <td colspan="5" class="text-center text-muted py-4">
            <i class="bi bi-search me-1"></i> No employees match your search.
          </td>
        </tr>
      </tbody>
    </table>
    </div>
  </div>

  <!-- Pagination -->
  <div class="d-flex justify-content-between align-items-center mt-3">
    <div id="paginationInfo" class="small text-muted"></div>
    <nav>
      <ul id="paginationControls" class="pagination pagination-sm mb-0"></ul>
    </nav>
  </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
let currentPage = 1;
const recordsPerPage = 10;

function confirmDelete(id) {
    Swal.fire({
        title: 'Are you sure?',
        text: "You won't be able to revert this!",
        icon: 'warning',
        width: '350px',  
        padding: '1.5rem',
        showCancelButton: true,
        confirmButtonColor: '#3085d6',
        cancelButtonColor: '#d33',
        confirmButtonText: 'Yes, delete it!',
    }).then((result) => {
        if (result.isConfirmed) {
            window.location.href = '/contractor/delete-employee/' + id;
        }
    });
}

function filterAndPaginate() {
    const query = document.getElementById('employeeSearch').value.toLowerCase().trim();
    const rows = Array.from(document.querySelectorAll('#employeeTableBody tr:not(#noResultsRow)'));
    const noRow = document.getElementById('noResultsRow');
    
    const visibleRows = rows.filter(row => {
        const text = row.innerText.toLowerCase();
        return text.includes(query);
    });

    noRow.style.display = visibleRows.length === 0 ? '' : 'none';

    // Pagination logic
    const totalRecords = visibleRows.length;
    const totalPages = Math.ceil(totalRecords / recordsPerPage);
    
    if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
    if (currentPage < 1) currentPage = 1;

    const start = (currentPage - 1) * recordsPerPage;
    const end = start + recordsPerPage;

    rows.forEach(row => row.style.display = 'none');
    visibleRows.forEach((row, idx) => {
        if (idx >= start && idx < end) row.style.display = '';
    });

    // Update Pagination UI
    updatePaginationUI(totalRecords, totalPages);
}

function updatePaginationUI(total, totalPages) {
    const controls = document.getElementById('paginationControls');
    const info = document.getElementById('paginationInfo');
    controls.innerHTML = '';

    if (total === 0) {
        info.innerText = 'No records found';
        return;
    }

    const start = (currentPage - 1) * recordsPerPage + 1;
    const end = Math.min(currentPage * recordsPerPage, total);
    info.innerText = `Showing ${start} to ${end} of ${total}`;

    for (let i = 1; i <= totalPages; i++) {
        const li = document.createElement('li');
        li.className = `page-item ${i === currentPage ? 'active' : ''}`;
        li.innerHTML = `<a class="page-link" href="#" onclick="changePage(${i})">${i}</a>`;
        controls.appendChild(li);
    }
}

function changePage(p) {
    currentPage = p;
    filterAndPaginate();
}

// Initial call
document.addEventListener('DOMContentLoaded', filterAndPaginate);

</script>
</body>
</html>
