<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manage Configurations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .container { max-width: 1200px; margin-top: 30px; }
        h2 { font-size: 1.5rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); background: white; padding: 15px 20px; margin-bottom: 20px; }
        .table th { font-weight: 700; text-transform: uppercase; font-size: 0.62rem; letter-spacing: 0.08em; color: #475569; padding: 12px 8px; border-bottom: 2px solid #f1f5f9; background-color: #f8fafc; }
        .table td { padding: 4px 8px; vertical-align: middle; font-size: 0.72rem; border-bottom: 1px solid #f1f5f9; color: #334155; }
        .table tbody tr:hover { background-color: #fcfdfe; }
        .btn-primary { background-color: #2563eb; border: none; font-weight: 600; font-size: 0.8rem; padding: 6px 16px; border-radius: 8px; }
        .btn-primary:hover { background-color: #1d4ed8; transform: translateY(-1px); transition: all 0.2s; }
        .config-row { background-color: #f8fafc; padding: 18px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .form-label { font-size: 0.65rem; margin-bottom: 0.35rem; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.02em; }
        .form-control-sm, .form-select-sm { font-size: 0.72rem; border-radius: 6px; border-color: #e2e8f0; padding-top: 4px; padding-bottom: 4px; }
        .form-control-sm:focus, .form-select-sm:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .modal-xl { max-width: 1300px; }
        .column-name-cell { min-width: 150px; }
        .file-name-cell { min-width: 180px; }
        .pos-cell { width: 80px; }
        .ed-cell { width: 100px; }
        .parse-cell, .key-cell { width: 90px; }
        .rectangular-toast { margin-top: 70px !important; border-radius: 4px !important; font-size: 0.82rem !important; border: 1px solid #047857; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1) !important; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar('Configuration')}"></div>

    <div class="container">
        <div class="d-flex justify-content-end align-items-center mb-4">
            <button class="btn btn-primary btn-sm" onclick="showCreateModal()">+ Add</button>
        </div>

        <!-- Configuration List -->
        <div class="card">
            <div class="table-responsive">
                <table class="table" id="configTable">
                    <thead>
                        <tr>
                            <th>Configuration Name</th>
                            <th>Header/Trailer Skip</th>
                            <th>Payable Col Pos</th>
                            <th class="text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="configTableBody">
                        <tr th:each="config : ${configurations}" class="config-row-item">
                            <td th:text="${config.configName}" class="fw-medium"></td>
                            <td th:text="${config.headerCount + ' / ' + config.trailerCount}"></td>
                            <td th:text="${config.totalPayableColumn}"></td>
                            <td class="text-center">
                                <button class="btn btn-outline-info btn-sm px-3 me-1" th:onclick="'previewConfig(' + ${config.id} + ')'">Preview</button>
                                <button class="btn btn-outline-primary btn-sm px-3 me-1" th:onclick="'showEditModal(' + ${config.id} + ')'">Edit</button>
                                <button class="btn btn-outline-danger btn-sm px-3" th:onclick="'deleteConfig(' + ${config.id} + ')'">Delete</button>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(configurations)}" id="noConfigRow">
                            <td colspan="4" class="text-center py-4 text-muted">No saved configurations found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- Pagination for Configurations -->
            <div id="configPagination" class="d-flex justify-content-center mt-3 mb-2" th:if="${not #lists.isEmpty(configurations)}">
                <nav>
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item"><button class="page-link" onclick="changeConfigPage(configCurrentPage - 1)" id="prevConfigBtn">Previous</button></li>
                        <li class="page-item disabled"><span class="page-link" id="configPageInfo">1 / 1</span></li>
                        <li class="page-item"><button class="page-link" onclick="changeConfigPage(configCurrentPage + 1)" id="nextConfigBtn">Next</button></li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div class="modal fade" id="configModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content p-3">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">New Configuration</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="configId">
                    <div class="mb-3">
                        <label class="form-label">Configuration Name</label>
                        <input type="text" id="configName" class="form-control">
                    </div>

                    <div class="config-row">
                        <div class="row">
                            <div class="col-md-3">
                                <label class="form-label">Header Skip</label>
                                <input type="number" id="headerCount" class="form-control form-control-sm" value="0">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Trailer Skip</label>
                                <input type="number" id="trailerCount" class="form-control form-control-sm" value="0">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Total Payable Amount Col Pos</label>
                                <input type="number" id="totalPayableColumn" class="form-control form-control-sm">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Overtime Total Col Pos</label>
                                <input type="number" id="overtimeTotalAmountColumn" class="form-control form-control-sm">
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="fw-bold mb-0">Columns Mapping</h6>
                        <button class="btn btn-outline-primary btn-sm" onclick="addNewColumnRow()">+ Add Column</button>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-sm">
                            <thead>
                                    <th class="file-name-cell">File Name</th>
                                    <th class="column-name-cell">Column Name</th>
                                    <th style="width: 110px;">Data Type</th>
                                    <th class="pos-cell">Pos (Excel)</th>
                                    <th class="text-center ed-cell">E/D</th>
                                    <th class="parse-cell">Parse</th>
                                    <th class="key-cell">Key</th>
                                    <th style="width: 40px;" class="text-center"></th>
                                </tr>
                            </thead>
                            <tbody id="columnBody">
                                <!-- Dynamic Rows -->
                            </tbody>
                        </table>
                    </div>
                    <!-- Pagination for Column Mapping -->
                    <div id="columnPagination" class="d-flex justify-content-center mt-2">
                        <nav>
                            <ul class="pagination pagination-sm mb-0">
                                <li class="page-item"><button class="page-link" onclick="changeColumnPage(columnCurrentPage - 1)" id="prevColBtn">Previous</button></li>
                                <li class="page-item disabled"><span class="page-link" id="columnPageInfo">1 / 1</span></li>
                                <li class="page-item"><button class="page-link" onclick="changeColumnPage(columnCurrentPage + 1)" id="nextColBtn">Next</button></li>
                            </ul>
                        </nav>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary px-4" onclick="saveConfiguration()">Save Configuration</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:inline="javascript">
        let modal;
        let configCurrentPage = 1;
        const configPageSize = 10;
        let configRows = [];

        let columnCurrentPage = 1;
        const columnPageSize = 5;
        let columnsData = []; // Array of {columnName, dataType, columnPosition, fileType, parse, isKey}
        
        /*[Hold uploadedFiles in JS]*/
        const uploadedFiles = /*[[${uploadedFiles}]]*/ [];

        document.addEventListener('DOMContentLoaded', function() {
            modal = new bootstrap.Modal(document.getElementById('configModal'));
            
            // Initialize config list pagination
            configRows = Array.from(document.querySelectorAll('.config-row-item'));
            if (configRows.length > 0) {
                renderConfigTable();
            }
            
            // Check for success message in URL
            const urlParams = new URLSearchParams(window.location.search);
            const successMsg = urlParams.get('success');
            if (successMsg) {
                Swal.fire({
                    toast: true,
                    position: 'top',
                    showConfirmButton: false,
                    timer: 1500,
                    timerProgressBar: true,
                    icon: 'success',
                    title: successMsg,
                    background: '#059669',
                    color: '#ffffff',
                    iconColor: '#ffffff',
                    padding: '8px 24px',
                    width: 'auto',
                    showClass: {
                        popup: 'swal2-noanimation',
                        backdrop: 'swal2-noanimation'
                    },
                    hideClass: {
                        popup: '',
                        backdrop: ''
                    },
                    customClass: {
                        popup: 'rectangular-toast'
                    }
                });
                // Clean up URL without reloading
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        });

        // Config List Pagination
        function renderConfigTable() {
            const startIndex = (configCurrentPage - 1) * configPageSize;
            const endIndex = startIndex + configPageSize;
            const totalPages = Math.ceil(configRows.length / configPageSize) || 1;

            configRows.forEach((row, idx) => {
                row.style.display = (idx >= startIndex && idx < endIndex) ? '' : 'none';
            });

            document.getElementById('configPageInfo').innerText = `${configCurrentPage} / ${totalPages}`;
            document.getElementById('prevConfigBtn').parentElement.classList.toggle('disabled', configCurrentPage === 1);
            document.getElementById('nextConfigBtn').parentElement.classList.toggle('disabled', configCurrentPage === totalPages);
        }

        function changeConfigPage(page) {
            const totalPages = Math.ceil(configRows.length / configPageSize) || 1;
            if (page < 1 || page > totalPages) return;
            configCurrentPage = page;
            renderConfigTable();
        }

        // Column Mapping Logic
        function showCreateModal() {
            document.getElementById('configId').value = '';
            document.getElementById('configName').value = '';
            document.getElementById('headerCount').value = '0';
            document.getElementById('trailerCount').value = '0';
            document.getElementById('totalPayableColumn').value = '';
            document.getElementById('overtimeTotalAmountColumn').value = '';
            columnsData = [];
            columnCurrentPage = 1;
            document.querySelector('#configModal .modal-title').innerText = 'New Configuration';
            addNewColumnRow();
            modal.show();
        }

        function showEditModal(id) {
            fetch('/contractor/get-configuration/' + id)
                .then(res => res.json())
                .then(data => {
                    if (!data) return;
                    document.getElementById('configId').value = id;
                    document.getElementById('configName').value = data.configName || '';
                    document.getElementById('headerCount').value = data.headerCount;
                    document.getElementById('trailerCount').value = data.trailerCount;
                    document.getElementById('totalPayableColumn').value = data.totalPayableColumn;
                    document.getElementById('overtimeTotalAmountColumn').value = data.overtimeTotalAmountColumn || '';
                    document.querySelector('#configModal .modal-title').innerText = 'Edit Configuration';
                    
                    columnsData = data.columns.map(col => ({
                        fileType: col.fileType || 'Regular File',
                        columnName: col.columnName,
                        dataType: col.dataType,
                        columnPosition: col.columnPosition,
                        salaryType: col.salaryType || null,
                        parse: col.parse === false ? false : true,
                        isKey: col.isKey === true ? true : false
                    }));
                    columnCurrentPage = 1;
                    renderColumnTable();
                    modal.show();
                });
        }

        function addNewColumnRow() {
            // Save current page inputs first
            saveCurrentPageData();
            
            // Add new empty column
            columnsData.push({ fileType: '', columnName: '', dataType: 'STRING', columnPosition: '', salaryType: null, parse: true, isKey: false });
            
            // Go to last page
            columnCurrentPage = Math.ceil(columnsData.length / columnPageSize) || 1;
            renderColumnTable();
        }

        function saveCurrentPageData() {
            const rows = document.querySelectorAll('#columnBody tr');
            const startIndex = (columnCurrentPage - 1) * columnPageSize;
            
            rows.forEach((row, idx) => {
                const dataIdx = startIndex + idx;
                if (dataIdx < columnsData.length) {
                    const fileType = row.querySelector('td:nth-child(1) select').value;
                    const columnName = row.querySelector('td:nth-child(2) input').value.trim();
                    const dataType = row.querySelector('td:nth-child(3) select').value;
                    const columnPosition = row.querySelector('td:nth-child(4) input').value;
                    const parseValue = row.querySelector('td:nth-child(6) select').value === 'true';
                    const isKeyValue = row.querySelector('td:nth-child(7) select').value === 'true';
                    
                    let sType = null;
                    if (dataType === 'NUMBER') {
                        const checkedRadio = row.querySelector('input[type="radio"]:checked');
                        if (checkedRadio) sType = checkedRadio.value;
                    }

                    columnsData[dataIdx] = {
                        fileType: fileType,
                        columnName: columnName,
                        dataType: dataType,
                        columnPosition: columnPosition,
                        salaryType: sType,
                        parse: parseValue,
                        isKey: isKeyValue
                    };
                }
            });
        }

        function renderColumnTable() {
            const tbody = document.getElementById('columnBody');
            tbody.innerHTML = '';
            
            const startIndex = (columnCurrentPage - 1) * columnPageSize;
            const endIndex = startIndex + columnPageSize;
            const pageData = columnsData.slice(startIndex, endIndex);

            pageData.forEach((col, idx) => {
                const globalIdx = startIndex + idx;
                const row = document.createElement('tr');
                let fileOptionsHTML = '';
                if (uploadedFiles && uploadedFiles.length > 0) {
                    uploadedFiles.forEach(f => {
                        const isSelected = col.fileType === f.fileName ? 'selected' : '';
                        fileOptionsHTML += `<option value="${f.fileName}" ${isSelected}>${f.fileName}</option>`;
                    });
                } else {
                    const regSelected = col.fileType === 'Regular File' ? 'selected' : '';
                    const ovtSelected = col.fileType === 'Overtime File' ? 'selected' : '';
                    fileOptionsHTML += `<option value="Regular File" ${regSelected}>Regular File</option>
                                        <option value="Overtime File" ${ovtSelected}>Overtime File</option>`;
                }

                row.innerHTML = `
                    <td class="file-name-cell">
                        <select class="form-select form-select-sm" required>
                            <option value="" disabled ${!col.fileType ? 'selected' : ''}>-- Select --</option>
                            ${fileOptionsHTML}
                        </select>
                    </td>
                    <td class="column-name-cell"><input type="text" class="form-control form-control-sm" value="${col.columnName}"></td>
                    <td>
                        <select class="form-select form-select-sm" onchange="toggleED(this)" required>
                            <option value="STRING" ${col.dataType === 'STRING' ? 'selected' : ''}>STRING</option>
                            <option value="NUMBER" ${col.dataType === 'NUMBER' ? 'selected' : ''}>NUMBER</option>
                        </select>
                    </td>
                    <td class="pos-cell"><input type="number" class="form-control form-control-sm" value="${col.columnPosition}"></td>
                    <td class="text-center ed-cell">
                        <div class="justify-content-center gap-2 ed-container ${col.dataType === 'NUMBER' ? 'd-flex' : 'd-none'}">
                            <div class="form-check form-check-inline m-0">
                                <input class="form-check-input" type="radio" name="salaryType_${globalIdx}" value="E" ${col.salaryType === 'E' ? 'checked' : ''}>
                                <label class="form-check-label" style="font-size: 0.65rem;">E</label>
                            </div>
                            <div class="form-check form-check-inline m-0">
                                <input class="form-check-input" type="radio" name="salaryType_${globalIdx}" value="D" ${col.salaryType === 'D' ? 'checked' : ''}>
                                <label class="form-check-label" style="font-size: 0.65rem;">D</label>
                            </div>
                        </div>
                    </td>
                    <td class="parse-cell">
                        <select class="form-select form-select-sm">
                            <option value="true" ${col.parse ? 'selected' : ''}>Yes</option>
                            <option value="false" ${!col.parse ? 'selected' : ''}>No</option>
                        </select>
                    </td>
                    <td class="key-cell">
                        <select class="form-select form-select-sm is-key-select">
                            <option value="false" ${!col.isKey ? 'selected' : ''}>No</option>
                            <option value="true" ${col.isKey ? 'selected' : ''}>Yes</option>
                        </select>
                    </td>
                    <td class="text-center">
                        <button class="btn btn-link text-danger btn-sm p-0" onclick="removeColumn(${globalIdx})">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash3" viewBox="0 0 16 16">
                                <path d="M6.5 1h3a.5.5 0 0 1 .5.5v1H6v-1a.5.5 0 0 1 .5-.5ZM11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3A1.5 1.5 0 0 0 5 1.5v1H2.506a.58.58 0 0 0-.01 0H1.5a.5.5 0 0 0 0 1h.538l.853 10.66A2 2 0 0 0 4.885 16h6.23a2 2 0 0 0 1.994-1.84l.853-10.66h.538a.5.5 0 0 0 0-1h-.995a.59.59 0 0 0-.01 0H11Zm1.958 1-.846 10.58a1 1 0 0 1-.997.92h-6.23a1 1 0 0 1-.997-.92L3.042 3.5h9.916Zm-7.487 1a.5.5 0 0 1 .528.47l.5 8.5a.5.5 0 0 1-.998.06L5 5.03a.5.5 0 0 1 .47-.53Zm5.058 0a.5.5 0 0 1 .47.53l-.5 8.5a.5.5 0 1 1-.998-.06l.5-8.5a.5.5 0 0 1 .528-.47ZM8 4.5a.5.5 0 0 1 .5.5v8.5a.5.5 0 0 1-1 0V5a.5.5 0 0 1 .5-.5Z"/>
                            </svg>
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });

            // Update Pagination UI
            const totalPages = Math.ceil(columnsData.length / columnPageSize) || 1;
            document.getElementById('columnPageInfo').innerText = `${columnCurrentPage} / ${totalPages}`;
            document.getElementById('prevColBtn').parentElement.classList.toggle('disabled', columnCurrentPage === 1);
            document.getElementById('nextColBtn').parentElement.classList.toggle('disabled', columnCurrentPage === totalPages);
            document.getElementById('columnPagination').style.display = totalPages > 0 ? 'flex' : 'none';
        }

        function handleKeyLogic(changedSelect) {
            // Enforcement removed - multiple keys allowed
        }

        function changeColumnPage(page) {
            const totalPages = Math.ceil(columnsData.length / columnPageSize) || 1;
            if (page < 1 || page > totalPages) return;
            
            saveCurrentPageData();
            columnCurrentPage = page;
            renderColumnTable();
        }

        function removeColumn(idx) {
            columnsData.splice(idx, 1);
            const totalPages = Math.ceil(columnsData.length / columnPageSize) || 1;
            if (columnCurrentPage > totalPages) columnCurrentPage = totalPages;
            renderColumnTable();
        }

        function saveConfiguration() {
            saveCurrentPageData(); // Ensure last edits are captured
            
            const id = document.getElementById('configId').value;
            const configName = document.getElementById('configName').value.trim();
            const totalPayableCol = document.getElementById('totalPayableColumn').value;
            const overtimeTotalCol = document.getElementById('overtimeTotalAmountColumn').value;

            if (!configName || !totalPayableCol) {
                Swal.fire('Error', 'Configuration name and Total Payable column are mandatory.', 'error');
                return;
            }

            const validColumns = columnsData.filter(c => c.columnName && c.columnName.trim() !== '');

            const data = {
                id: id ? parseInt(id) : null,
                configName: configName,
                headerCount: parseInt(document.getElementById('headerCount').value) || 0,
                trailerCount: parseInt(document.getElementById('trailerCount').value) || 0,
                totalPayableColumn: parseInt(totalPayableCol),
                overtimeTotalAmountColumn: overtimeTotalCol ? parseInt(overtimeTotalCol) : 0,
                columns: validColumns.map(c => ({
                    fileType: c.fileType,
                    columnName: c.columnName,
                    dataType: c.dataType,
                    columnPosition: parseInt(c.columnPosition) || 0,
                    salaryType: c.salaryType,
                    parse: c.parse,
                    isKey: c.isKey
                }))
            };

            fetch('/contractor/save-configuration', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => res.text())
            .then(text => {
                if (text === 'OK') {
                    window.location.href = window.location.pathname + '?success=Configuration saved successfully.';
                }
                else Swal.fire('Error', text, 'error');
            });
        }

        function deleteConfig(id) {
            Swal.fire({
                title: 'Are you sure?',
                text: "You won't be able to revert this!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#2563eb',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Yes, delete it!'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = '/contractor/delete-configuration/' + id;
                }
            });
        }

        function toggleED(select) {
            const row = select.closest('tr');
            const container = row.querySelector('.ed-container');
            if (select.value === 'NUMBER') {
                container.classList.remove('d-none');
                container.classList.add('d-flex');
            } else {
                container.classList.add('d-none');
                container.classList.remove('d-flex');
                row.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
            }
        }

        function previewConfig(id) {
            window.location.href = '/contractor/preview-config/' + id;
        }
    </script>
</body>
</html>
