<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Define Columns</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .container { max-width: 1000px; margin-top: 30px; }
        h2 { font-size: 1.5rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); background: white; padding: 15px 20px; }
        .table th { font-weight: 600; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.05em; color: #64748b; padding: 8px 12px; }
        .table td { padding: 4px 8px; vertical-align: middle; }
        .form-control-sm, .form-select-sm { font-size: 0.8rem; padding: 0.2rem 0.5rem; }
        .btn-add { background-color: #eff6ff; color: #2563eb; border: 1px dashed #3b82f6; width: 100%; margin-top: 5px; padding: 6px; font-weight: 500; font-size: 0.85rem; border-radius: 8px; }
        .btn-show { background-color: #2563eb; color: white; font-weight: 600; padding: 4px 10px; border-radius: 6px; font-size: 0.85rem; transition: all 0.2s ease; border: none; white-space: nowrap; }
        .btn-show:hover { background-color: #1d4ed8; color: white; transform: translateY(-1px); }
        .btn-show:active { transform: translateY(0); }
        .config-row { background-color: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .form-label { font-size: 0.75rem; margin-bottom: 0.25rem; }
        .small-text { font-size: 0.75rem; color: #64748b; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .form-control:focus, .form-select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
            outline: 0;
        }
        .is-invalid { 
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12' width='12' height='12' fill='none' stroke='%23dc2626'%3e%3ccircle cx='6' cy='6' r='4.5'/%3e%3cpath stroke-linejoin='round' d='M5.8 3.6h.4L6 6.5z'/%3e%3ccircle cx='6' cy='8.2' r='.6' fill='%23dc2626' stroke='none'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right calc(0.375em + 0.1875rem) center;
            background-size: calc(0.75em + 0.375rem) calc(0.75em + 0.375rem);
            border-color: #e2e8f0 !important;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container">
        <div class="mb-3">
            <button class="btn btn-light" style="font-size: 0.85rem;" onclick="history.back()">&larr; Back to History</button>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
            <div style="width: 200px;"></div> <!-- Spacer -->
            <h2 class="fw-bold mb-0 text-dark mx-auto">Mapping Configuration</h2>
            <div style="width: 200px;" class="text-end">
                <button class="btn btn-show" onclick="saveAndShow()">Show Preview &raquo;</button>
            </div>
        </div>

        <div class="card">
            <!-- Header/Trailer Config -->
            <div class="config-row">
                <div class="row">
                    <div class="col-md-3">
                        <label class="form-label fw-bold text-muted">Header Rows to Skip</label>
                        <input type="number" id="headerCount" class="form-control form-control-sm" 
                               th:value="${headerCount}" 
                               onfocus="if(this.value=='0')this.value=''" 
                               onblur="if(this.value=='')this.value='0'" min="0">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold text-muted">Trailer Rows to Skip</label>
                        <input type="number" id="trailerCount" class="form-control form-control-sm" 
                               th:value="${trailerCount}" 
                               onfocus="if(this.value=='0')this.value=''" 
                               onblur="if(this.value=='')this.value='0'" min="0">
                    </div>
                    <div class="col-md-6 d-flex align-items-end justify-content-end">
                        <button class="btn btn-outline-primary btn-sm mb-1 px-3" style="font-size: 0.75rem; border-style: dashed;" onclick="addRow()">+ Add Column</button>
                    </div>
                </div>
            </div>

            <div id="validationError" class="mb-3" style="display: none; color: #dc2626; font-size: 0.85rem; font-weight: 600;">
                <i class="bi bi-exclamation-circle-fill me-1"></i>
                Please fill all mandatory fields to proceed.
            </div>

            <table class="table table-hover" id="columnTable">
                <thead>
                    <tr>
                        <th>Column Name</th>
                        <th style="width: 120px;">Data Type</th>
                        <th style="width: 150px;">Position (Excel)</th>
                        <th style="width: 80px;" class="text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="columnBody">
                    <tr th:each="col : ${existingColumns}">
                        <td><input type="text" class="form-control form-control-sm" th:value="${col.columnName}" placeholder="Column Name" oninput="this.classList.remove('is-invalid')" required></td>
                        <td>
                            <select class="form-select form-select-sm" onchange="this.classList.remove('is-invalid')" required>
                                <option value="STRING" th:selected="${col.dataType == 'STRING'}">STRING</option>
                                <option value="NUMBER" th:selected="${col.dataType == 'NUMBER'}">NUMBER</option>
                            </select>
                        </td>
                        <td><input type="number" class="form-control form-control-sm" th:value="${col.columnPosition}" placeholder="Pos" min="1" oninput="this.classList.remove('is-invalid')" required></td>
                        <td class="text-center">
                            <button class="btn btn-outline-danger btn-sm py-1 px-2" style="font-size: 0.75rem;" onclick="this.parentElement.parentElement.remove()">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        </div>
    </div>

    <script th:inline="javascript">
        /*[Hold fileId in JS]*/
        const fileId = [[${fileId}]];

        function addRow() {
            const tbody = document.getElementById('columnBody');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><input type="text" class="form-control form-control-sm" placeholder="Column Name" oninput="this.classList.remove('is-invalid')" required></td>
                <td>
                    <select class="form-select form-select-sm" onchange="this.classList.remove('is-invalid')" required>
                        <option value="STRING">STRING</option>
                        <option value="NUMBER">NUMBER</option>
                    </select>
                </td>
                <td><input type="number" class="form-control form-control-sm" placeholder="Pos" min="1" oninput="this.classList.remove('is-invalid')" required></td>
                <td class="text-center">
                    <button class="btn btn-outline-danger btn-sm py-1 px-2" style="font-size: 0.75rem;" onclick="this.parentElement.parentElement.remove()">Delete</button>
                </td>
            `;
            tbody.appendChild(row);
        }

        // Add initial row ONLY if no existing columns
        const existingCount = [[${existingColumns.size()}]];
        if (existingCount === 0) {
            addRow();
        }

        function saveAndShow() {
            const rows = document.querySelectorAll('#columnBody tr');
            const data = [];
            
            let isValid = true;
            document.getElementById('validationError').style.display = 'none';

            rows.forEach(r => {
                const inputs = r.querySelectorAll('input, select');
                const nameInput = inputs[0];
                const posInput = inputs[2];
                
                const name = nameInput.value.trim();
                const pos = posInput.value.trim();
                
                // Reset states
                nameInput.classList.remove('is-invalid');
                posInput.classList.remove('is-invalid');

                if (!name) {
                    isValid = false;
                    nameInput.classList.add('is-invalid');
                }
                if (!pos) {
                    isValid = false;
                    posInput.classList.add('is-invalid');
                }

                data.push({
                    columnName: name,
                    dataType: inputs[1].value,
                    columnPosition: parseInt(pos) || 0,
                    parse: true
                });
            });

            if (!isValid) {
                document.getElementById('validationError').style.display = 'block';
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }

            const config = {
                fileId: fileId,
                headerCount: parseInt(document.getElementById('headerCount').value) || 0,
                trailerCount: parseInt(document.getElementById('trailerCount').value) || 0,
                columns: data
            };

            fetch('/contractor/save-columns-and-config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config)
            })
            .then(res => {
                if(res.ok) window.location.href = '/contractor/preview';
                else alert('Error saving configuration');
            });
        }
    </script>
</body>
</html>
