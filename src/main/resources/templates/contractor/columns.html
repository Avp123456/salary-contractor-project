<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Define Columns</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .container { max-width: 1000px; margin-top: 30px; }
        h2 { font-size: 1.5rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); background: white; padding: 15px 20px; }
        .table th { font-weight: 600; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.05em; color: #64748b; padding: 8px 12px; }
        .table td { padding: 4px 8px; vertical-align: middle; }
        .form-control-sm, .form-select-sm { font-size: 0.8rem; padding: 0.2rem 0.5rem; }
        .btn-add { background-color: #eff6ff; color: #2563eb; border: 1px dashed #3b82f6; width: 100%; margin-top: 5px; padding: 6px; font-weight: 500; font-size: 0.85rem; border-radius: 8px; }
        .btn-show { background-color: #2563eb; color: white; font-weight: 600; padding: 4px 10px; border-radius: 6px; font-size: 0.85rem; transition: all 0.2s ease; border: none; white-space: nowrap; }
        .btn-show:hover { background-color: #1d4ed8; color: white; transform: translateY(-1px); }
        .btn-show:active { transform: translateY(0); }
        .config-row { background-color: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .form-label { font-size: 0.75rem; margin-bottom: 0.25rem; }
        .small-text { font-size: 0.75rem; color: #64748b; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .form-control:focus, .form-select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
            outline: 0;
        }
        .is-invalid { 
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12' width='12' height='12' fill='none' stroke='%23dc2626'%3e%3ccircle cx='6' cy='6' r='4.5'/%3e%3cpath stroke-linejoin='round' d='M5.8 3.6h.4L6 6.5z'/%3e%3ccircle cx='6' cy='8.2' r='.6' fill='%23dc2626' stroke='none'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right calc(0.375em + 0.1875rem) center;
            background-size: calc(0.75em + 0.375rem) calc(0.75em + 0.375rem);
            border-color: #e2e8f0 !important;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar('Files')}"></div>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
            <div style="width: 200px;"></div> <!-- Spacer -->
            <h2 class="fw-bold mb-0 text-dark mx-auto"></h2> <!-- Removed Header -->
            <div style="width: 200px;" class="text-end">
                <button class="btn btn-show" onclick="saveAndShow()">Show Preview &raquo;</button>
            </div>
        </div>

        <div class="card">
            <!-- Header/Trailer Config -->
            <div class="config-row">
                <div class="row align-items-end">
                    <div class="col-md-4">
                        <label class="form-label fw-bold text-primary">Select Saved Configuration</label>
                        <select id="configSelect" class="form-select form-select-sm" onchange="loadConfiguration(this.value)">
                            <option value="">-- Manual Configuration --</option>
                            <option th:each="cfg : ${configurations}" th:value="${cfg.id}" th:text="${cfg.configName}"></option>
                        </select>
                    </div>
                    <div class="col-md-8 text-end">
                        <button class="btn btn-outline-primary btn-sm px-3" style="font-size: 0.75rem; border-style: dashed;" onclick="addRow()">+ Add Column</button>
                    </div>
                </div>
                <hr class="my-3 text-muted opacity-25">
                <div class="row">
                    <div class="col-md-2">
                        <label class="form-label fw-bold text-muted">Header Skip</label>
                        <input type="number" id="headerCount" class="form-control form-control-sm" 
                                 th:value="${headerCount}" min="0">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-bold text-muted">Trailer Skip</label>
                        <input type="number" id="trailerCount" class="form-control form-control-sm" 
                                 th:value="${trailerCount}" min="0">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold text-muted">Total Payable Amount Column Position</label>
                        <input type="number" id="totalPayableColumn" class="form-control form-control-sm" 
                                 th:value="${totalPayableColumn}" 
                                 oninput="this.classList.remove('is-invalid')"
                                 min="1" required>
                    </div>
                </div>
            </div>

            <div id="validationError" class="mb-3" style="display: none; color: #dc2626; font-size: 0.85rem; font-weight: 600;">
                <i class="bi bi-exclamation-circle-fill me-1"></i>
                Please fill all mandatory fields to proceed.
            </div>

            <div class="table-responsive">
                <table class="table table-hover" id="columnTable">
                <thead>
                    <tr>
                        <th>Column Name</th>
                        <th style="width: 120px;">Data Type</th>
                        <th style="width: 150px;">Position (Excel)</th>
                        <th style="width: 120px;" class="text-center">E/D</th>
                        <th style="width: 80px;" class="text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="columnBody">
                    <tr th:each="col, stat : ${existingColumns}">
                        <td><input type="text" class="form-control form-control-sm" th:value="${col.columnName}" oninput="this.classList.remove('is-invalid')" required></td>
                        <td>
                            <select class="form-select form-select-sm" onchange="toggleED(this)" required>
                                <option value="STRING" th:selected="${col.dataType == 'STRING'}">STRING</option>
                                <option value="NUMBER" th:selected="${col.dataType == 'NUMBER'}">NUMBER</option>
                            </select>
                        </td>
                        <td><input type="number" class="form-control form-control-sm" th:value="${col.columnPosition}" min="1" oninput="this.classList.remove('is-invalid')" required></td>
                        <td class="text-center">
                            <div class="d-flex justify-content-center gap-2 ed-container" th:style="${col.dataType == 'NUMBER' ? '' : 'display:none'}">
                                <div class="form-check form-check-inline m-0">
                                    <input class="form-check-input" type="radio" th:name="'salaryType_' + ${stat.index}" value="E" th:checked="${col.salaryType == 'E'}">
                                    <label class="form-check-label small">E</label>
                                </div>
                                <div class="form-check form-check-inline m-0">
                                    <input class="form-check-input" type="radio" th:name="'salaryType_' + ${stat.index}" value="D" th:checked="${col.salaryType == 'D'}">
                                    <label class="form-check-label small">D</label>
                                </div>
                            </div>
                        </td>
                        <td class="text-center">
                            <button class="btn btn-outline-danger btn-sm py-1 px-2" style="font-size: 0.75rem;" onclick="removeRow(this)">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
            </div>

            <!-- Pagination Controls -->
            <div class="d-flex justify-content-between align-items-center mt-3">
                <div class="small text-muted" id="paginationInfo">Showing 1 to 10 of 10</div>
                <nav>
                    <ul class="pagination pagination-sm mb-0" id="paginationControls">
                        <!-- Dynamic -->
                    </ul>
                </nav>
            </div>
        </div>
        
    </div>

    <script th:inline="javascript">
        /*[Hold fileId in JS]*/
        const fileId = [[${fileId}]];
        let currentPage = 1;
        const recordsPerPage = 10;

        function toggleED(select) {
            select.classList.remove('is-invalid');
            const row = select.closest('tr');
            const container = row.querySelector('.ed-container');
            if (select.value === 'NUMBER') {
                container.style.display = 'flex';
            } else {
                container.style.display = 'none';
                row.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
            }
        }

        function addRow() {
            const tbody = document.getElementById('columnBody');
            const index = tbody.rows.length;
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><input type="text" class="form-control form-control-sm" oninput="this.classList.remove('is-invalid')" required></td>
                <td>
                    <select class="form-select form-select-sm" onchange="toggleED(this)" required>
                        <option value="STRING">STRING</option>
                        <option value="NUMBER">NUMBER</option>
                    </select>
                </td>
                <td><input type="number" class="form-control form-control-sm" min="1" oninput="this.classList.remove('is-invalid')" required></td>
                <td class="text-center">
                    <div class="d-flex justify-content-center gap-2 ed-container" style="display:none !important">
                        <div class="form-check form-check-inline m-0">
                            <input class="form-check-input" type="radio" name="salaryType_${index}" value="E">
                            <label class="form-check-label small">E</label>
                        </div>
                        <div class="form-check form-check-inline m-0">
                            <input class="form-check-input" type="radio" name="salaryType_${index}" value="D">
                            <label class="form-check-label small">D</label>
                        </div>
                    </div>
                </td>
                <td class="text-center">
                    <button class="btn btn-outline-danger btn-sm py-1 px-2" style="font-size: 0.75rem;" onclick="removeRow(this)">Delete</button>
                </td>
            `;
            tbody.appendChild(row);
            updatePagination();
            goToPage(Math.ceil(tbody.rows.length / recordsPerPage));
        }

        function removeRow(btn) {
            btn.parentElement.parentElement.remove();
            updatePagination();
            if (currentPage > Math.ceil(document.getElementById('columnBody').rows.length / recordsPerPage)) {
                currentPage = Math.max(1, currentPage - 1);
            }
            applyPagination();
        }

        function loadConfiguration(id) {
            if (!id) return;
            fetch('/contractor/get-configuration/' + id)
                .then(res => res.json())
                .then(data => {
                    if (!data) return;
                    document.getElementById('headerCount').value = data.headerCount;
                    document.getElementById('trailerCount').value = data.trailerCount;
                    document.getElementById('totalPayableColumn').value = data.totalPayableColumn;
                    
                    const tbody = document.getElementById('columnBody');
                    tbody.innerHTML = ''; // Clear existing
                    
                    data.columns.forEach((col, index) => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td><input type="text" class="form-control form-control-sm" value="${col.columnName}" required></td>
                            <td>
                                <select class="form-select form-select-sm" onchange="toggleED(this)" required>
                                    <option value="STRING" ${col.dataType === 'STRING' ? 'selected' : ''}>STRING</option>
                                    <option value="NUMBER" ${col.dataType === 'NUMBER' ? 'selected' : ''}>NUMBER</option>
                                </select>
                            </td>
                            <td><input type="number" class="form-control form-control-sm" value="${col.columnPosition}" min="1" required></td>
                            <td class="text-center">
                                <div class="d-flex justify-content-center gap-2 ed-container" style="${col.dataType === 'NUMBER' ? '' : 'display:none !important'}">
                                    <div class="form-check form-check-inline m-0">
                                        <input class="form-check-input" type="radio" name="salaryType_${index}" value="E" ${col.salaryType === 'E' ? 'checked' : ''}>
                                        <label class="form-check-label small">E</label>
                                    </div>
                                    <div class="form-check form-check-inline m-0">
                                        <input class="form-check-input" type="radio" name="salaryType_${index}" value="D" ${col.salaryType === 'D' ? 'checked' : ''}>
                                        <label class="form-check-label small">D</label>
                                    </div>
                                </div>
                            </td>
                            <td class="text-center">
                                <button class="btn btn-outline-danger btn-sm py-1 px-2" style="font-size: 0.75rem;" onclick="removeRow(this)">Delete</button>
                            </td>
                        `;
                        tbody.appendChild(row);
                    });
                    updatePagination();
                    goToPage(1);
                });
        }

        function updatePagination() {
            const rows = document.getElementById('columnBody').rows;
            const pageCount = Math.ceil(rows.length / recordsPerPage);
            const controls = document.getElementById('paginationControls');
            controls.innerHTML = '';

            for (let i = 1; i <= pageCount; i++) {
                const li = document.createElement('li');
                li.className = `page-item ${i === currentPage ? 'active' : ''}`;
                li.innerHTML = `<a class="page-link" href="#" onclick="goToPage(${i})">${i}</a>`;
                controls.appendChild(li);
            }
            applyPagination();
        }

        function goToPage(p) {
            currentPage = p;
            applyPagination();
            
            const controls = document.getElementById('paginationControls').children;
            for (let i = 0; i < controls.length; i++) {
                controls[i].classList.remove('active');
                if (i + 1 === currentPage) controls[i].classList.add('active');
            }
        }

        function applyPagination() {
            const rows = document.getElementById('columnBody').rows;
            const start = (currentPage - 1) * recordsPerPage;
            const end = start + recordsPerPage;

            for (let i = 0; i < rows.length; i++) {
                rows[i].style.display = (i >= start && i < end) ? '' : 'none';
            }

            const info = document.getElementById('paginationInfo');
            const total = rows.length;
            if (total === 0) {
                info.innerText = 'No records';
            } else {
                info.innerText = `Showing ${start + 1} to ${Math.min(end, total)} of ${total}`;
            }
        }

        // Add initial row ONLY if no existing columns
        const existingCount = [[${existingColumns.size()}]];
        if (existingCount === 0) {
            addRow();
        } else {
            updatePagination();
            applyPagination();
        }

        function saveAndShow() {
            const rows = document.querySelectorAll('#columnBody tr');
            const data = [];
            
            let isValid = true;
            document.getElementById('validationError').style.display = 'none';

            const totalPayColInput = document.getElementById('totalPayableColumn');
            if (!totalPayColInput.value || totalPayColInput.value <= 0) {
                isValid = false;
                totalPayColInput.classList.add('is-invalid');
            }

            rows.forEach((r, idx) => {
                const inputs = r.querySelectorAll('input:not([type="radio"]), select');
                const nameInput = inputs[0];
                const typeSelect = inputs[1];
                const posInput = inputs[2];
                
                const name = nameInput.value.trim();
                const pos = posInput.value.trim();
                const type = typeSelect.value;
                
                // Reset states
                nameInput.classList.remove('is-invalid');
                posInput.classList.remove('is-invalid');

                if (!name) {
                    isValid = false;
                    nameInput.classList.add('is-invalid');
                }
                if (!pos) {
                    isValid = false;
                    posInput.classList.add('is-invalid');
                }

                let sType = null;
                if (type === 'NUMBER') {
                    const checkedRadio = r.querySelector('input[type="radio"]:checked');
                    if (checkedRadio) sType = checkedRadio.value;
                }

                data.push({
                    columnName: name,
                    dataType: type,
                    columnPosition: parseInt(pos) || 0,
                    salaryType: sType,
                    parse: true
                });
            });

            if (!isValid) {
                document.getElementById('validationError').style.display = 'block';
                // Find first invalid page and go to it
                for(let i=0; i<data.length; i++) {
                    if(!data[i].columnName || !data[i].columnPosition) {
                        goToPage(Math.floor(i / recordsPerPage) + 1);
                        break;
                    }
                }
                return;
            }

            const config = {
                fileId: fileId,
                headerCount: parseInt(document.getElementById('headerCount').value) || 0,
                trailerCount: parseInt(document.getElementById('trailerCount').value) || 0,
                totalPayableColumn: parseInt(document.getElementById('totalPayableColumn').value) || 0,
                columns: data
            };

            fetch('/contractor/save-columns-and-config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config)
            })
            .then(res => {
                if(res.ok) window.location.href = '/contractor/preview';
                else alert('Error saving configuration');
            });
        }
    </script>
</body>
</html>
