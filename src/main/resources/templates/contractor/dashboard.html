<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Contractor Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; }
        .container { max-width: 1200px; margin-top: 50px; }
        .section { margin-top: 30px; }
        .card { border: none; border-radius: 16px; transition: transform 0.2s; overflow: hidden; }
        .card:hover { transform: translateY(-5px); }
        .stat-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.8; margin-bottom: 8px; }
        .stat-value { font-size: 2rem; font-weight: 700; margin-bottom: 0; }
        .bg-gradient-employees { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); color: white; }
        .bg-gradient-salary { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; }
        .bg-gradient-files { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; }
    </style>
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>
    
    <div class="container">
        <div id="dashboard" class="section">
            <h3 class="fw-bold mb-4" style="color: #1e293b; letter-spacing: -0.025em;">Dashboard Overview</h3>
            <div class="row g-4">

                <!-- Total Records -->
                <div class="col-md-4">
                    <div class="card p-4 text-center bg-gradient-employees shadow-sm">
                        <div class="stat-label">Total Processed Records</div>
                        <h2 class="stat-value" th:text="${totalEmployees}">0</h2>
                    </div>
                </div>

                <!-- Total Salary -->
                <div class="col-md-4">
                    <div class="card p-4 text-center bg-gradient-salary shadow-sm">
                        <div class="stat-label">Total Salary Amount</div>
                        <h2 class="stat-value" th:text="'₹' + ${#numbers.formatDecimal(totalSalary, 1, 'COMMA', 2, 'POINT')}">₹0</h2>
                    </div>
                </div>

                <!-- Total Files -->
                <div class="col-md-4">
                    <div class="card p-4 text-center bg-gradient-files shadow-sm">
                        <div class="stat-label">Total Uploaded Files</div>
                        <h2 class="stat-value" th:text="${totalFiles}">0</h2>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
