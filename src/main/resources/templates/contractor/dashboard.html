<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Contractor Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f4f6f9;
}

/* Navbar */
.navbar {
    background: #2c3e50;
}
.navbar-brand, .nav-link {
    color: #fff !important;
}
.nav-link:hover {
    color: #39d98a !important;
}

/* Cards */
.card {
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
.section {
    margin-top: 30px;
}
</style>
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>
<div class="container">

<!-- 📊 DASHBOARD -->
<div id="dashboard" class="section">
    <h3>Dashboard</h3>
    <div class="row">

        <div class="col-md-3">
            <div class="card p-3 text-center">
                <h5>Total Employees</h5>
                <h3>0</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 text-center">
                <h5>Total Salary</h5>
                <h3>₹0</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 text-center">
                <h5>Pending Payments</h5>
                <h3>0</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 text-center">
                <h5>Last Upload</h5>
                <h6>Not Uploaded</h6>
            </div>
        </div>

    </div>
</div>




</div>

</body>
</html>
