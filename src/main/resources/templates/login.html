<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<style>

/* ---------- GLOBAL ---------- */
body {
  margin: 0;
  height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
    url("https://t4.ftcdn.net/jpg/17/42/93/47/240_F_1742934729_zZy9JHoPHwI1G7xBOGUdAE47A9N6zarS.jpg");
  background-size: cover;
  background-position: center;
}

/* ---------- WRAPPER ---------- */
.login-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ---------- TITLE ---------- */
.welcome-title {
  color: #ffffff;
  font-size: 26px;
  font-weight: 600;
  margin-bottom: 18px;
}

/* ---------- CARD ---------- */
.login-card {
  width: 100%;
  max-width: 420px;
  padding: 36px;
  border-radius: 14px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(8px);
  box-shadow: 0 18px 40px rgba(0,0,0,0.35);
  animation: fadeUp 0.5s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

.login-card h3 {
  text-align: center;
  margin-bottom: 25px;
}

/* ---------- INPUT ---------- */
.form-control {
  border-radius: 8px;
  padding: 12px;
}

.form-control:focus {
  border-color: #39d98a;
  box-shadow: 0 0 0 0.15rem rgba(57,217,138,0.25);
}

.password-wrapper {
  position: relative;
}

.password-toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #64748b;
  z-index: 10;
}

/* ---------- BUTTON ---------- */
.btn-login {
  background: #39d98a;
  border: none;
  font-weight: 600;
  border-radius: 8px;
  padding: 12px;
}

.btn-login:hover {
  background: #2ecf7f;
}

/* ---------- ROLE SELECTOR ---------- */
.role-selector {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.role-card {
  flex: 1;
  text-align: center;
  padding: 10px;
  border-radius: 8px;
  border: 2px solid #ced4da;
  cursor: pointer;
  background: #f8f9fa;
  transition: all 0.25s ease;
}
/* 🔥 HOVER (only slight size increase) */
.role-card:hover {
  transform: scale(1.02); /* very subtle */
}

/* ✅ SELECTED (no animation, no extra effects) */
input[type="radio"]:checked + .role-card {
  background: #39d98a;
  border-color: #ced4da; /* same border */
  font-weight: 600;
}

/* ---------- ERROR ---------- */
.role-error {
  color: red;
  font-size: 14px;
  display: none;
  margin-bottom: 10px;
}

/* ---------- TOAST ---------- */
.toast-message {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 22px;
  border-radius: 20px;
}

.toast-success { background: #39d98a; }
.toast-error { background: #dc3545; color: white; }

</style>
</head>

<body>

<!-- SUCCESS REGISTER -->
<div class="toast-message toast-success" th:if="${param.registered}">
  Registration successful! Please login.
</div>

<!-- SUCCESS LOGOUT -->
<div class="toast-message toast-success" th:if="${param.logout}">
  Logged out successfully
</div>

<!-- ERROR -->
<div class="toast-message toast-error" th:if="${error}">
  <span th:text="${error}"></span>
</div>

<div class="login-wrapper">

  <div class="welcome-title">Welcome Back</div>

  <div class="login-card">
    <h3>Login</h3>
      <form id="loginForm" th:action="@{${loginAction}}" method="post">

      <!-- INPUTS -->
      <input class="form-control mb-3" type="email" name="email" placeholder="Email" required>
      
      <div class="password-wrapper mb-3">
        <input class="form-control" type="password" id="password" name="password" placeholder="Password" required>
        <i class="bi bi-eye-slash password-toggle" id="togglePassword"></i>
      </div>

      <button type="submit" class="btn btn-login w-100">Login</button>
      
     	<button type="button"
        	class="btn btn-light w-100 mt-3 border"
        	onclick="googleLogin()">
			<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg"
         	width="20"
         	style="margin-right:10px;">

    	Login with Google
		</button>

      <!-- REGISTER LINK -->
      <div class="mt-4 text-center" th:if="${isContractor}">
        <span style="font-size: 14px; color: #64748b;">Don't have an account?</span>
        <a th:href="@{/register}" style="color: #39d98a; font-weight: 600; text-decoration: none; margin-left: 5px;">Register</a>
      </div>

    </form>

  </div>

</div>

<script>
function googleLogin() {
    window.location.href = "/oauth2/authorization/google";
}

/* 🔥 TOGGLE PASSWORD VISIBILITY */
const togglePassword = document.querySelector('#togglePassword');
const passwordField = document.querySelector('#password');

togglePassword.addEventListener('click', function (e) {
    const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordField.setAttribute('type', type);
    this.classList.toggle('bi-eye');
    this.classList.toggle('bi-eye-slash');
});

/* 🔥 AUTO HIDE TOAST */
setTimeout(() => {
  const toast = document.querySelector(".toast-message");
  if (toast) {
    toast.style.opacity = "0";
    setTimeout(() => toast.remove(), 500);
  }
}, 3000);

</script>

</body>
</html>
