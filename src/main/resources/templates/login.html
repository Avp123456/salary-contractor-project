<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ---------- GLOBAL ---------- */
body {
  margin: 0;
  height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
    url("https://t4.ftcdn.net/jpg/17/42/93/47/240_F_1742934729_zZy9JHoPHwI1G7xBOGUdAE47A9N6zarS.jpg");
  background-size: cover;
  background-position: center;
}

/* ---------- WRAPPER ---------- */
.login-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ---------- TITLE ---------- */
.welcome-title {
  color: #ffffff;
  font-size: 26px;
  font-weight: 600;
  margin-bottom: 18px;
}

/* ---------- CARD ---------- */
.login-card {
  width: 420px;
  padding: 36px;
  border-radius: 14px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(8px);
  box-shadow: 0 18px 40px rgba(0,0,0,0.35);
  animation: fadeUp 0.5s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

.login-card h3 {
  text-align: center;
  margin-bottom: 25px;
}

/* ---------- INPUT ---------- */
.form-control {
  border-radius: 8px;
  padding: 12px;
}

.form-control:focus {
  border-color: #39d98a;
  box-shadow: 0 0 0 0.15rem rgba(57,217,138,0.25);
}

/* ---------- BUTTON ---------- */
.btn-login {
  background: #39d98a;
  border: none;
  font-weight: 600;
  border-radius: 8px;
  padding: 12px;
}

.btn-login:hover {
  background: #2ecf7f;
}

/* ---------- ROLE SELECTOR ---------- */
.role-selector {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.role-card {
  flex: 1;
  text-align: center;
  padding: 10px;
  border-radius: 8px;
  border: 2px solid #ced4da;
  cursor: pointer;
  background: #f8f9fa;
  transition: all 0.25s ease;
}
/* 🔥 HOVER (only slight size increase) */
.role-card:hover {
  transform: scale(1.02); /* very subtle */
}

/* ✅ SELECTED (no animation, no extra effects) */
input[type="radio"]:checked + .role-card {
  background: #39d98a;
  border-color: #ced4da; /* same border */
  font-weight: 600;
}

/* ---------- ERROR ---------- */
.role-error {
  color: red;
  font-size: 14px;
  display: none;
  margin-bottom: 10px;
}

/* ---------- TOAST ---------- */
.toast-message {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 22px;
  border-radius: 20px;
}

.toast-success { background: #39d98a; }
.toast-error { background: #dc3545; color: white; }

</style>
</head>

<body>

<!-- SUCCESS -->
<div class="toast-message toast-success" th:if="${param.logout}">
  Logged out successfully
</div>

<!-- ERROR -->
<div class="toast-message toast-error" th:if="${error}">
  <span th:text="${error}"></span>
</div>

<div class="login-wrapper">

  <div class="welcome-title">Welcome Back</div>

  <div class="login-card">
    <h3>Login</h3>

    <form id="loginForm" th:action="@{/login}" method="post">

      <!-- ROLE -->
      <div class="role-selector">

        <input type="radio" id="contractor" name="role" value="CONTRACTOR" hidden>
        <label for="contractor" class="role-card">Contractor</label>

        <input type="radio" id="employee" name="role" value="EMPLOYEE" hidden>
        <label for="employee" class="role-card">Employee</label>

      </div>

      <!-- ERROR MESSAGE -->
      <div id="roleError" class="role-error">
        Please select Contractor or Employee
      </div>

      <!-- INPUTS -->
      <input class="form-control mb-3" type="email" name="email" placeholder="Email" required>
      <input class="form-control mb-3" type="password" name="password" placeholder="Password" required>

      <button type="submit" class="btn btn-login w-100">Login</button>

    </form>

  </div>

</div>

<script>

/* 🔥 ROLE VALIDATION */
document.getElementById("loginForm").addEventListener("submit", function(e) {
  const role = document.querySelector('input[name="role"]:checked');

  if (!role) {
    e.preventDefault();
    document.getElementById("roleError").style.display = "block";
  }
});

/* 🔥 AUTO HIDE TOAST */
setTimeout(() => {
  const toast = document.querySelector(".toast-message");
  if (toast) {
    toast.style.opacity = "0";
    setTimeout(() => toast.remove(), 500);
  }
}, 3000);





/* 🔥 TOGGLE RADIO (SELECT / UNSELECT) */
const radios = document.querySelectorAll('input[name="role"]');

radios.forEach(radio => {
  radio.addEventListener("click", function(e) {

    if (this.checked && this.dataset.wasChecked === "true") {
    	
      this.checked = false; // unselect
      this.dataset.wasChecked = "false";
    } else {
      radios.forEach(r => r.dataset.wasChecked = "false");
      this.dataset.wasChecked = "true";
    }

  });
});



</script>

</body>
</html>
