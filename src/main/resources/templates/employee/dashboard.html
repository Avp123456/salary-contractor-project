<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Employee Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .navbar { background: white; border-bottom: 1px solid #e2e8f0; padding: 15px 0; }
        .navbar-brand { font-weight: 700; color: #2563eb !important; }
        .container { max-width: 900px; margin-top: 40px; }
        .welcome-card { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); color: white; border-radius: 16px; padding: 30px; margin-bottom: 30px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .welcome-card h2 { font-weight: 700; margin-bottom: 5px; }
        .welcome-card p { opacity: 0.8; margin-bottom: 0; }
        .card { border: none; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); background: white; padding: 20px; }
        .section-title { font-weight: 700; color: #1e293b; margin-bottom: 20px; display: flex; align-items: center; }
        .section-title i { margin-right: 10px; color: #2563eb; }
        .payslip-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid #f1f5f9; transition: all 0.2s; }
        .payslip-item:last-child { border-bottom: none; }
        .payslip-item:hover { background-color: #f8fafc; }
        .payslip-info h6 { font-weight: 600; margin-bottom: 2px; }
        .payslip-info span { font-size: 0.8rem; color: #64748b; }
        .btn-view { background-color: #eff6ff; color: #2563eb; font-weight: 600; border: none; padding: 8px 16px; border-radius: 10px; font-size: 0.85rem; transition: all 0.2s; }
        .btn-view:hover { background-color: #2563eb; color: white; }
        .amount-tag { font-weight: 700; color: #1e293b; font-size: 1rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="#">Employee Portal</a>
            <div class="ms-auto">
                <a href="/logout" class="btn btn-outline-danger btn-sm fw-bold px-3" style="border-radius: 8px;">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="welcome-card">
            <h2 th:text="'Hello, ' + ${employee.name}">Hello, User</h2>
            <p th:text="'Employee ID: ' + ${employee.empCode}">Employee ID: EMP001</p>
        </div>

        <div class="card">
            <h5 class="section-title"><i class="bi bi-file-earmark-text-fill"></i> My Payslips</h5>
            
            <div th:if="${#lists.isEmpty(payslips)}" class="text-center py-5">
                <img src="https://cdn-icons-png.flaticon.com/512/7486/7486744.png" style="width: 80px; opacity: 0.2; margin-bottom: 15px;">
                <p class="text-muted">No payslips available yet.</p>
            </div>

            <div th:each="p : ${payslips}" class="payslip-item">
                <div class="payslip-info">
                    <h6 th:text="${p.displayName}">Monthly Salary - March 2026</h6>
                    <span th:text="${#temporals.format(p.uploadDate, 'dd MMM yyyy')}">Uploaded on 05 Mar 2026</span>
                </div>
                <div class="d-flex align-items-center">
                    <div class="amount-tag me-4" th:text="'₹' + ${#numbers.formatDecimal(p.amount, 1, 'COMMA', 2, 'POINT')}">₹45,000.00</div>
                    <a th:href="@{'/employee/payslip/' + ${p.id}}" class="btn btn-view">View Payslip</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
