<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Secure Your Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); width: 100%; max-width: 400px; padding: 30px; background: white; }
        .logo { width: 60px; height: 60px; background: #2563eb; color: white; display: flex; align-items: center; justify-content: center; border-radius: 12px; margin: 0 auto 20px; font-size: 1.5rem; font-weight: 700; }
        h4 { font-weight: 700; color: #1e293b; text-align: center; margin-bottom: 8px; }
        p { color: #64748b; text-align: center; font-size: 0.875rem; margin-bottom: 24px; }
        .form-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: #475569; }
        .form-control { border-radius: 10px; padding: 12px; border: 1.5px solid #e2e8f0; font-size: 0.95rem; }
        .form-control:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .btn-primary { background: #2563eb; border: none; padding: 12px; border-radius: 10px; font-weight: 600; width: 100%; margin-top: 10px; transition: all 0.2s; }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
        .security-note { font-size: 0.75rem; color: #94a3b8; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">E</div>
        <h4>Secure Your Account</h4>
        <p>For your security, please update your initial password before proceeding.</p>
        
        <form th:action="@{/employee/update-password}" method="post" id="passwordForm">
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" name="newPassword" id="newPassword" class="form-control" placeholder="••••••••" required minlength="6">
            </div>
            <div class="mb-4">
                <label class="form-label">Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required>
                <div id="errorMsg" class="text-danger mt-1" style="display:none; font-size: 0.75rem;">Passwords do not match!</div>
            </div>
            <button type="submit" class="btn btn-primary">Update & Continue</button>
        </form>
        
        <div class="security-note">
            Your contractor set a temporary password for you. Please choose a strong one that you'll remember.
        </div>
    </div>

    <script>
        document.getElementById('passwordForm').onsubmit = function(e) {
            const pass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            if (pass !== confirm) {
                document.getElementById('errorMsg').style.display = 'block';
                return false;
            }
        };
    </script>
</body>
</html>
