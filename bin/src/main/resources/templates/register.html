<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
    url("https://t4.ftcdn.net/jpg/17/42/93/47/240_F_1742934729_zZy9JHoPHwI1G7xBOGUdAE47A9N6zarS.jpg");
  background-size: cover;
}

.login-card {
  width: 420px;
  padding: 36px;
  border-radius: 14px;
  background: rgba(255,255,255,0.92);
}

.btn-main {
  background: #39d98a;
  border: none;
  font-weight: 600;
}
</style>
</head>

<body>

<div class="login-card">

  <h3 class="text-center mb-4">Register</h3>

  <form action="/register" method="post">

    <input class="form-control mb-3" name="name" placeholder="Full Name" required>

    <input class="form-control mb-3" type="email" name="email" placeholder="Email" required>

    <input class="form-control mb-3" type="password" name="password" placeholder="Password" required>
    
    <select class="form-control mb-3" name="role" required>
  <option value="">Select Role</option>
  <option value="CONTRACTOR">Contractor</option>
  <option value="EMPLOYEE">Employee</option>
</select>

    <button type="submit" class="btn btn-main w-100">Register</button>

  </form>

  <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>

  <p class="text-center mt-3">
    Already have account? <a href="/">Login</a>
  </p>

</div>

</body>
</html>
